name: Autotest Package Manager Installation

on:
  workflow_call:
    inputs:
      version:
        description: 'Release tag to test (empty = resolve latest release automatically)'
        required: false
        type: string
        default: ''
      ref:
        required: false
        type: string
        default: ''
      run_mode:
        description: '"release" for post-release, "nightly" for scheduled'
        required: false
        type: string
        default: 'nightly'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to test (empty = resolve latest release automatically)'
        required: false
        type: string
        default: ''
      run_mode:
        description: '"release" for post-release, "nightly" for scheduled'
        required: false
        type: string
        default: 'nightly'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/test_pkg_managers.yml'
      - 'tests/scripts/CLIPkgManagerInstall.test.js'
      - 'tests/suites/CLI-pkg-*.json'
      - 'tests/CLIRunner.test.js'

jobs:
  setup-matrix:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      resolved_version: ${{ steps.resolve.outputs.cli_version }}
      resolved_stripped: ${{ steps.resolve.outputs.stripped }}
      winget_version_available: ${{ steps.winget-check.outputs.available }}
    steps:
      - name: Resolve version from latest release (nightly / PR)
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            STRIPPED="${INPUT_VERSION#v}"
            echo "cli_version=eim ${STRIPPED}" >> $GITHUB_OUTPUT
            echo "stripped=${STRIPPED}" >> $GITHUB_OUTPUT
            echo "Using provided version: ${STRIPPED}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [ -n "$TAG" ]; then
              STRIPPED="${TAG#v}"
              echo "cli_version=eim ${STRIPPED}" >> $GITHUB_OUTPUT
              echo "stripped=${STRIPPED}" >> $GITHUB_OUTPUT
              echo "Resolved latest release: ${TAG} -> ${STRIPPED}"
            else
              echo "cli_version=" >> $GITHUB_OUTPUT
              echo "stripped=" >> $GITHUB_OUTPUT
              echo "WARNING: Could not resolve latest release, running version-agnostic"
            fi
          fi

      - name: Check WinGet manifest availability (Option A)
        id: winget-check
        shell: bash
        run: |
          STRIPPED="${{ steps.resolve.outputs.stripped }}"
          if [ -z "$STRIPPED" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "No version to check, skipping WinGet manifest lookup"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://raw.githubusercontent.com/microsoft/winget-pkgs/master/manifests/e/Espressif/EIM-CLI/${STRIPPED}/Espressif.EIM-CLI.yaml")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "WinGet manifest for ${STRIPPED} found (HTTP $HTTP_CODE)"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "WinGet manifest for ${STRIPPED} not found (HTTP $HTTP_CODE), version assertion will be skipped for WinGet"
          fi

      - name: Build matrix
        id: set
        shell: bash
        run: |
          MATRIX='{"include":['
          MATRIX+='{"os":"ubuntu-latest","pkg_manager":"apt","suite_file":"CLI-pkg-deb","container":"ubuntu:latest","node_arch":"x64","distro_name":"ubuntu"},'
          MATRIX+='{"os":"ubuntu-latest","pkg_manager":"apt","suite_file":"CLI-pkg-deb","container":"debian:latest","node_arch":"x64","distro_name":"debian"},'
          MATRIX+='{"os":"ubuntu-latest","pkg_manager":"dnf","suite_file":"CLI-pkg-rpm","container":"fedora:latest","node_arch":"x64","distro_name":"fedora"},'
          MATRIX+='{"os":"macos-latest","pkg_manager":"brew","suite_file":"CLI-pkg-brew"},'
          MATRIX+='{"os":"windows-latest","pkg_manager":"scoop","suite_file":"CLI-pkg-scoop"}'
          RUN_MODE="${{ inputs.run_mode }}"
          if [ -z "$RUN_MODE" ]; then RUN_MODE="nightly"; fi
          if [[ "$RUN_MODE" != "release" ]]; then
            MATRIX+=',{"os":"windows-latest","pkg_manager":"winget","suite_file":"CLI-pkg-winget"}'
          fi
          MATRIX+=']}'
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    name: PkgMgr (${{ matrix.pkg_manager }}) ${{ matrix.distro_name || '' }}
    needs: setup-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve version for this matrix entry
        id: version
        shell: bash
        run: |
          CLI_VERSION="${{ needs.setup-matrix.outputs.resolved_version }}"
          STRIPPED="${{ needs.setup-matrix.outputs.resolved_stripped }}"
          PKG_MANAGER="${{ matrix.pkg_manager }}"
          WINGET_AVAILABLE="${{ needs.setup-matrix.outputs.winget_version_available }}"

          if [[ "$PKG_MANAGER" == "winget" && "$WINGET_AVAILABLE" != "true" ]]; then
            echo "WinGet manifest not yet merged — skipping version assertion"
            CLI_VERSION=""
            STRIPPED=""
          fi

          echo "cli_version=${CLI_VERSION}" >> $GITHUB_OUTPUT
          echo "stripped=${STRIPPED}" >> $GITHUB_OUTPUT

      # Linux (Docker container)

      - name: Set up Node.js (Linux host)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build node test dependencies (Linux host)
        if: matrix.os == 'ubuntu-latest'
        working-directory: tests
        run: npm ci

      - name: Start test container (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker create --name test-runner \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/tests \
            -e LOG_TO_FILE=true \
            -e EIM_CLI_PATH=/usr/bin/eim \
            -e EIM_CLI_VERSION="${{ steps.version.outputs.cli_version }}" \
            ${{ matrix.container }} \
            sleep infinity
          docker start test-runner

          docker exec test-runner bash -c "
            if command -v apt-get &>/dev/null; then
              apt-get update && apt-get install -y curl ca-certificates sudo
            elif command -v dnf &>/dev/null; then
              dnf install -y curl ca-certificates sudo tar gzip
            fi
            curl -fsSL https://nodejs.org/dist/v20.20.0/node-v20.20.0-linux-${{ matrix.node_arch }}.tar.gz \
              | tar -xz -C /usr/local --strip-components=1
            node --version
            npm --version
          "

      - name: Wait for package version availability (Linux, release mode)
        if: matrix.os == 'ubuntu-latest' && inputs.run_mode == 'release' && steps.version.outputs.stripped != ''
        run: |
          EXPECTED_VERSION="${{ steps.version.outputs.stripped }}"
          echo "Waiting for version ${EXPECTED_VERSION} to appear in package repo..."
          docker exec test-runner bash -c "
            for i in \$(seq 1 10); do
              if command -v apt-get &>/dev/null; then
                apt-get update -qq 2>/dev/null
                if apt-cache show eim-cli 2>/dev/null | grep -q \"Version:.*${EXPECTED_VERSION}\"; then
                  echo \"Version ${EXPECTED_VERSION} found in APT repo on attempt \$i\"
                  exit 0
                fi
              elif command -v dnf &>/dev/null; then
                dnf makecache -q 2>/dev/null
                if dnf info eim-cli 2>/dev/null | grep -q \"${EXPECTED_VERSION}\"; then
                  echo \"Version ${EXPECTED_VERSION} found in RPM repo on attempt \$i\"
                  exit 0
                fi
              fi
              echo \"Retry \$i/10: version ${EXPECTED_VERSION} not yet available, waiting 60s...\"
              sleep 60
            done
            echo \"WARNING: Version ${EXPECTED_VERSION} not found after 10 retries, proceeding anyway\"
          "
        continue-on-error: true

      - name: Run package manager tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker exec test-runner npm run test-CLI --file=${{ matrix.suite_file }}
        continue-on-error: true

      - name: Copy EIM logs from container (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker cp test-runner:/root/.local/share/eim/logs/. ./tests/ 2>/dev/null || true

      - name: Stop test container (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker stop test-runner
          docker rm test-runner

      # macOS (Homebrew)

      - name: Set up Node.js (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build node test dependencies (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: tests
        run: npm ci

      - name: Run package manager tests (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          export LOG_TO_FILE="true"
          export EIM_CLI_PATH="$(brew --prefix)/bin/eim"
          export EIM_CLI_VERSION="${{ steps.version.outputs.cli_version }}"
          cd tests
          npm run test-CLI --file=${{ matrix.suite_file }}
        continue-on-error: true

      - name: Copy EIM logs (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp ~/Library/Application\ Support/eim/logs/*.log ./tests/ 2>/dev/null || true
        continue-on-error: true

      # Windows (Scoop / WinGet)

      - name: Set up Node.js (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Expand node modules (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Set-Location -Path "./tests"
          if (Test-Path node_modules.zip) { Expand-Archive node_modules.zip } else { npm ci }

      - name: Exclude workspace from Defender (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Verify WinGet version on runner (Option C)
        if: matrix.pkg_manager == 'winget' && steps.version.outputs.stripped != ''
        id: winget-runner-verify
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.stripped }}"
          Write-Host "Checking if WinGet index has version ${version}..."
          $result = winget show --id Espressif.EIM-CLI --version $version 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Version ${version} confirmed available in WinGet index"
            echo "confirmed=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Version ${version} not in WinGet index yet — clearing version assertion"
            echo "confirmed=false" >> $env:GITHUB_OUTPUT
          }
        continue-on-error: true

      - name: Run package manager tests (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $env:LOG_TO_FILE = "true"
          $cliVersion = "${{ steps.version.outputs.cli_version }}"
          if ("${{ matrix.pkg_manager }}" -eq "winget" -and "${{ steps.winget-runner-verify.outputs.confirmed }}" -ne "true") {
            Write-Host "WinGet version not confirmed on runner — running version-agnostic"
            $cliVersion = ""
          }
          $env:EIM_CLI_VERSION = $cliVersion
          Set-Location -Path "./tests"
          npm run test-CLI-win --file=${{ matrix.suite_file }}
        continue-on-error: true

      - name: Copy EIM logs (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Move-Item -Path "$env:LOCALAPPDATA\eim\logs\*" -Destination ".\tests\" -Force
        continue-on-error: true

      # Upload results & report

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autotest-pkg-manager-${{ matrix.pkg_manager }}-${{ matrix.distro_name || matrix.os }}
          path: |
            ./tests/results-*.json
            ./tests/*.log

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: PkgMgr-${{ matrix.pkg_manager }}-${{ matrix.distro_name || matrix.os }}
          path: ./tests/results-*.json
          path-replace-backslashes: "false"
          reporter: mocha-json
          fail-on-empty: true
