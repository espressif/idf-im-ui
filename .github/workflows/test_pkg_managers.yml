name: Autotest Package Manager Installation

on:
  workflow_call:
    inputs:
      version:
        description: 'Release tag to test (empty = resolve latest release automatically)'
        required: false
        type: string
        default: ''
      run_mode:
        description: '"release" for post-release, "nightly" for scheduled'
        required: false
        type: string
        default: 'nightly'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to test (empty = resolve latest release automatically)'
        required: false
        type: string
        default: ''
      run_mode:
        description: '"release" for post-release, "nightly" for scheduled'
        required: false
        type: string
        default: 'nightly'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/test_pkg_managers.yml'

# ─────────────────────────────────────────────────────────────
#  Jobs
# ─────────────────────────────────────────────────────────────

jobs:

  # ── 1. Resolve the version string once ──

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      stripped: ${{ steps.resolve.outputs.stripped }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          fi
          STRIPPED="${TAG#v}"
          echo "stripped=${STRIPPED}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${STRIPPED:-<none>}"

  # ── 2. Linux — native container, inline YAML matrix ──

  test-linux:
    name: PkgMgr (${{ matrix.pkg_manager }}) ${{ matrix.distro_name }}
    needs: resolve-version
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:latest
            pkg_manager: apt
            distro_name: ubuntu
            package_name: eim-cli
            install_cmd: apt-get install -y eim-cli
            uninstall_cmd: apt-get remove -y eim-cli
            meta_cmd: dpkg -l eim-cli
            repo_setup: |
              echo 'deb [trusted=yes] https://dl.espressif.com/dl/eim/apt stable main' \
                | tee /etc/apt/sources.list.d/eim.list
              apt-get update
          - image: fedora:latest
            pkg_manager: dnf
            distro_name: fedora
            package_name: eim-cli
            install_cmd: dnf install -y eim-cli
            uninstall_cmd: dnf remove -y eim-cli
            meta_cmd: rpm -qi eim-cli
            repo_setup: curl -fsSL https://dl.espressif.com/dl/eim/rpm/eim.repo -o /etc/yum.repos.d/eim.repo
    steps:
      - name: Install prerequisites
        run: |
          if command -v apt-get &>/dev/null; then
            apt-get update && apt-get install -y curl ca-certificates
          elif command -v dnf &>/dev/null; then
            dnf install -y curl ca-certificates
          fi

      - name: Configure package repository
        run: ${{ matrix.repo_setup }}

      - name: Wait for version availability (release mode)
        if: inputs.run_mode == 'release' && needs.resolve-version.outputs.stripped != ''
        run: |
          EXPECTED="${{ needs.resolve-version.outputs.stripped }}"
          for i in $(seq 1 10); do
            if command -v apt-get &>/dev/null; then
              apt-get update -qq 2>/dev/null
              apt-cache show ${{ matrix.package_name }} 2>/dev/null | grep -q "Version:.*${EXPECTED}" && echo "Found on attempt $i" && exit 0
            elif command -v dnf &>/dev/null; then
              dnf makecache -q 2>/dev/null
              dnf info ${{ matrix.package_name }} 2>/dev/null | grep -q "${EXPECTED}" && echo "Found on attempt $i" && exit 0
            fi
            echo "Retry $i/10 — waiting 60s..."
            sleep 60
          done
          echo "WARNING: version ${EXPECTED} not found after 10 retries, proceeding anyway"
        continue-on-error: true

      - name: Install package
        run: ${{ matrix.install_cmd }}

      - name: Verify binary on PATH
        run: command -v eim

      - name: Verify version
        run: |
          VERSION=$(eim --do-not-track true --version 2>&1) || true
          echo "Output: ${VERSION}"
          EXPECTED="${{ needs.resolve-version.outputs.stripped }}"
          if [ -n "$EXPECTED" ]; then
            echo "${VERSION}" | grep -q "${EXPECTED}" || { echo "FAIL: expected ${EXPECTED}"; exit 1; }
          fi

      - name: Verify help output
        run: eim --do-not-track true --help | grep -i install

      - name: Verify package metadata
        run: ${{ matrix.meta_cmd }}

      - name: Uninstall package
        run: ${{ matrix.uninstall_cmd }}

      - name: Upload EIM logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pkg-manager-logs-${{ matrix.pkg_manager }}-${{ matrix.distro_name }}
          path: /root/.local/share/eim/logs/
          if-no-files-found: ignore

  # ── 3. macOS — Homebrew ──

  test-brew:
    name: PkgMgr (brew)
    needs: resolve-version
    runs-on: macos-latest
    steps:
      - name: Install package
        run: brew install espressif/eim/eim

      - name: Verify binary on PATH
        run: which eim

      - name: Verify version
        run: |
          VERSION=$(eim --do-not-track true --version 2>&1) || true
          echo "Output: ${VERSION}"
          EXPECTED="${{ needs.resolve-version.outputs.stripped }}"
          [ -z "$EXPECTED" ] || echo "$VERSION" | grep -q "$EXPECTED"

      - name: Verify help output
        run: eim --do-not-track true --help | grep -i install

      - name: Verify package metadata
        run: brew list espressif/eim/eim

      - name: Uninstall package
        run: brew uninstall espressif/eim/eim

      - name: Upload EIM logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pkg-manager-logs-brew-macos
          path: ~/Library/Application Support/eim/logs/
          if-no-files-found: ignore

  # ── 4. Windows — WinGet (nightly / PR only) ──

  test-winget:
    name: PkgMgr (winget)
    needs: resolve-version
    if: inputs.run_mode != 'release'
    runs-on: windows-latest
    steps:
      - name: Exclude workspace from Defender
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Install package
        shell: pwsh
        run: |
          winget install --id Espressif.EIM-CLI --accept-package-agreements --accept-source-agreements
          $wingetLinks = "$env:LOCALAPPDATA\Microsoft\WinGet\Links"
          if (Test-Path $wingetLinks) { echo $wingetLinks >> $env:GITHUB_PATH }

      - name: Verify binary on PATH
        shell: pwsh
        run: |
          if (-not (Get-Command eim.exe -ErrorAction SilentlyContinue)) {
            Write-Error "eim.exe not found on PATH"; exit 1
          }

      - name: Verify version
        shell: pwsh
        run: |
          $output = & eim --do-not-track true --version 2>&1 | Out-String
          Write-Host "Output: $output"
          $expected = "${{ needs.resolve-version.outputs.stripped }}"
          if ($expected -and $output -notmatch [regex]::Escape($expected)) {
            Write-Error "FAIL: expected $expected"; exit 1
          }

      - name: Verify help output
        shell: pwsh
        run: |
          $output = & eim --do-not-track true --help 2>&1 | Out-String
          if ($output -notmatch "install") { Write-Error "help missing 'install'"; exit 1 }

      - name: Verify package metadata
        shell: pwsh
        run: winget list --id Espressif.EIM-CLI

      - name: Uninstall package
        shell: pwsh
        run: winget uninstall --id Espressif.EIM-CLI --accept-source-agreements

      - name: Upload EIM logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pkg-manager-logs-winget-windows
          path: ${{ env.LOCALAPPDATA }}\eim\logs\
          if-no-files-found: ignore

  # ── 5. Mattermost notification ──

  build-notification:
    name: Build notification
    needs: [resolve-version, test-linux, test-brew, test-winget]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      title: ${{ steps.msg.outputs.title }}
      body: ${{ steps.msg.outputs.body }}
    steps:
      - name: Build message
        id: msg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --paginate --jq '.jobs[] | select(.name | contains("PkgMgr")) | "\(.name)|\(.conclusion // "unknown")|\(.html_url)"')

          VERSION="${{ needs.resolve-version.outputs.stripped }}"
          RUN_MODE="${{ inputs.run_mode }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          [ -z "$RUN_MODE" ] && RUN_MODE="nightly"
          [ -z "$VERSION" ] && VERSION="latest"

          TABLE="| Job | Result |\n|:---|:---|\n"
          ALL_PASS=true
          while IFS='|' read -r NAME CONC URL; do
            [ -z "$NAME" ] && continue
            case "$CONC" in
              success)   STATUS=":white_check_mark: Passed" ;;
              failure)   STATUS=":x: Failed"; ALL_PASS=false ;;
              cancelled) STATUS=":no_entry_sign: Cancelled"; ALL_PASS=false ;;
              skipped)   STATUS=":fast_forward: Skipped" ;;
              *)         STATUS=":grey_question: $CONC"; ALL_PASS=false ;;
            esac
            TABLE+="| [$NAME]($URL) | $STATUS |\n"
          done <<< "$JOBS"

          if $ALL_PASS; then
            TITLE=":white_check_mark: Package Manager Tests — All Passed"
          else
            TITLE=":x: Package Manager Tests — Some Failed"
          fi

          BODY="**Version:** \`${VERSION}\` | **Mode:** ${RUN_MODE} | **Branch:** \`${BRANCH}\`\n\n"
          BODY+="${TABLE}\n\n"
          BODY+=":link: [View full run](${RUN_URL})"

          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "body<<BODY_EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "BODY_EOF" >> $GITHUB_OUTPUT

  notify:
    name: Notify Mattermost
    needs: [build-notification]
    if: always() && needs.build-notification.result == 'success'
    uses: ./.github/workflows/notify_mattermost.yml
    with:
      title: ${{ needs.build-notification.outputs.title }}
      body: ${{ needs.build-notification.outputs.body }}
    secrets: inherit
