name: Autotest Package Manager Installation

on:
  workflow_call:
    inputs:
      version:
        description: 'Release tag to test (empty = resolve latest release automatically)'
        required: false
        type: string
        default: ''
      ref:
        required: false
        type: string
        default: ''
      run_mode:
        description: '"release" for post-release, "nightly" for scheduled'
        required: false
        type: string
        default: 'nightly'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to test (empty = resolve latest release automatically)'
        required: false
        type: string
        default: ''
      run_mode:
        description: '"release" for post-release, "nightly" for scheduled'
        required: false
        type: string
        default: 'nightly'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/test_pkg_managers.yml'

jobs:
  setup-matrix:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      resolved_version: ${{ steps.resolve.outputs.cli_version }}
      resolved_stripped: ${{ steps.resolve.outputs.stripped }}
      winget_version_available: ${{ steps.winget-check.outputs.available }}
    steps:
      - name: Resolve version from latest release (nightly / PR)
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            STRIPPED="${INPUT_VERSION#v}"
            echo "cli_version=eim ${STRIPPED}" >> $GITHUB_OUTPUT
            echo "stripped=${STRIPPED}" >> $GITHUB_OUTPUT
            echo "Using provided version: ${STRIPPED}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [ -n "$TAG" ]; then
              STRIPPED="${TAG#v}"
              echo "cli_version=eim ${STRIPPED}" >> $GITHUB_OUTPUT
              echo "stripped=${STRIPPED}" >> $GITHUB_OUTPUT
              echo "Resolved latest release: ${TAG} -> ${STRIPPED}"
            else
              echo "cli_version=" >> $GITHUB_OUTPUT
              echo "stripped=" >> $GITHUB_OUTPUT
              echo "WARNING: Could not resolve latest release, running version-agnostic"
            fi
          fi

      - name: Check WinGet manifest availability (Option A)
        id: winget-check
        shell: bash
        run: |
          STRIPPED="${{ steps.resolve.outputs.stripped }}"
          if [ -z "$STRIPPED" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "No version to check, skipping WinGet manifest lookup"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://raw.githubusercontent.com/microsoft/winget-pkgs/master/manifests/e/Espressif/EIM-CLI/${STRIPPED}/Espressif.EIM-CLI.yaml")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "WinGet manifest for ${STRIPPED} found (HTTP $HTTP_CODE)"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "WinGet manifest for ${STRIPPED} not found (HTTP $HTTP_CODE), version assertion will be skipped for WinGet"
          fi

      - name: Build matrix
        id: set
        shell: bash
        run: |
          MATRIX='{"include":['
          MATRIX+='{"os":"ubuntu-latest","pkg_manager":"apt","container":"ubuntu:latest","node_arch":"x64","distro_name":"ubuntu","package_name":"eim-cli","install_cmd":"apt-get install -y eim-cli","uninstall_cmd":"apt-get remove -y eim-cli","meta_cmd":"dpkg -l eim-cli","repo_setup":"echo '\''deb [trusted=yes] https://dl.espressif.com/dl/eim/apt stable main'\'' | tee /etc/apt/sources.list.d/eim.list && apt-get update"},'
          MATRIX+='{"os":"ubuntu-latest","pkg_manager":"apt","container":"debian:latest","node_arch":"x64","distro_name":"debian","package_name":"eim-cli","install_cmd":"apt-get install -y eim-cli","uninstall_cmd":"apt-get remove -y eim-cli","meta_cmd":"dpkg -l eim-cli","repo_setup":"echo '\''deb [trusted=yes] https://dl.espressif.com/dl/eim/apt stable main'\'' | tee /etc/apt/sources.list.d/eim.list && apt-get update"},'
          MATRIX+='{"os":"ubuntu-latest","pkg_manager":"dnf","container":"fedora:latest","node_arch":"x64","distro_name":"fedora","package_name":"eim-cli","install_cmd":"dnf install -y eim-cli","uninstall_cmd":"dnf remove -y eim-cli","meta_cmd":"rpm -qi eim-cli","repo_setup":"curl -fsSL https://dl.espressif.com/dl/eim/rpm/eim.repo -o /etc/yum.repos.d/eim.repo"},'
          MATRIX+='{"os":"macos-latest","pkg_manager":"brew","package_name":"espressif/eim/eim","install_cmd":"brew install espressif/eim/eim","uninstall_cmd":"brew uninstall espressif/eim/eim","meta_cmd":"brew list espressif/eim/eim"},'
          STRIPPED="${{ steps.resolve.outputs.stripped }}"
          if [ -n "$STRIPPED" ]; then
            SCOOP_MANIFEST_URL="https://github.com/${{ github.repository }}/releases/download/v${STRIPPED}/eim-cli.json"
          else
            SCOOP_MANIFEST_URL="https://github.com/${{ github.repository }}/releases/latest/download/eim-cli.json"
          fi
          MATRIX+='{"os":"windows-latest","pkg_manager":"scoop","package_name":"eim-cli","scoop_manifest_url":"'"${SCOOP_MANIFEST_URL}"'","install_cmd":"scoop install .\\eim-cli.json","uninstall_cmd":"scoop uninstall eim-cli","meta_cmd":"scoop info eim-cli"}'
          RUN_MODE="${{ inputs.run_mode }}"
          if [ -z "$RUN_MODE" ]; then RUN_MODE="nightly"; fi
          if [[ "$RUN_MODE" != "release" ]]; then
            MATRIX+=',{"os":"windows-latest","pkg_manager":"winget","package_name":"Espressif.EIM-CLI","install_cmd":"winget install --id Espressif.EIM-CLI --accept-package-agreements --accept-source-agreements","uninstall_cmd":"winget uninstall --id Espressif.EIM-CLI --accept-source-agreements","meta_cmd":"winget list --id Espressif.EIM-CLI"}'
          fi
          MATRIX+=']}'
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    name: PkgMgr (${{ matrix.pkg_manager }}) ${{ matrix.distro_name || '' }}
    needs: setup-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Resolve version for this matrix entry
        id: version
        shell: bash
        run: |
          CLI_VERSION="${{ needs.setup-matrix.outputs.resolved_stripped }}"
          PKG_MANAGER="${{ matrix.pkg_manager }}"
          WINGET_AVAILABLE="${{ needs.setup-matrix.outputs.winget_version_available }}"

          if [[ "$PKG_MANAGER" == "winget" && "$WINGET_AVAILABLE" != "true" ]]; then
            echo "WinGet manifest not yet merged — skipping version assertion"
            CLI_VERSION=""
          fi

          echo "expected_version=${CLI_VERSION}" >> $GITHUB_OUTPUT

      # ── Linux (Docker container) ──

      - name: Start test container (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker create --name test-runner \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=Etc/UTC \
            ${{ matrix.container }} \
            sleep infinity
          docker start test-runner

      - name: Configure package repository (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker exec test-runner bash -c "
            if command -v apt-get &>/dev/null; then
              apt-get update && apt-get install -y curl ca-certificates sudo
            elif command -v dnf &>/dev/null; then
              dnf install -y curl ca-certificates sudo
            fi
            ${{ matrix.repo_setup }}
          "

      - name: Wait for package version availability (Linux, release mode)
        if: matrix.os == 'ubuntu-latest' && inputs.run_mode == 'release' && steps.version.outputs.expected_version != ''
        run: |
          EXPECTED_VERSION="${{ steps.version.outputs.expected_version }}"
          echo "Waiting for version ${EXPECTED_VERSION} to appear in package repo..."
          docker exec test-runner bash -c "
            for i in \$(seq 1 10); do
              if command -v apt-get &>/dev/null; then
                apt-get update -qq 2>/dev/null
                if apt-cache show eim-cli 2>/dev/null | grep -q \"Version:.*${EXPECTED_VERSION}\"; then
                  echo \"Version ${EXPECTED_VERSION} found in APT repo on attempt \$i\"
                  exit 0
                fi
              elif command -v dnf &>/dev/null; then
                dnf makecache -q 2>/dev/null
                if dnf info eim-cli 2>/dev/null | grep -q \"${EXPECTED_VERSION}\"; then
                  echo \"Version ${EXPECTED_VERSION} found in RPM repo on attempt \$i\"
                  exit 0
                fi
              fi
              echo \"Retry \$i/10: version ${EXPECTED_VERSION} not yet available, waiting 60s...\"
              sleep 60
            done
            echo \"WARNING: Version ${EXPECTED_VERSION} not found after 10 retries, proceeding anyway\"
          "
        continue-on-error: true

      - name: Install package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: docker exec test-runner bash -c "${{ matrix.install_cmd }}"

      - name: Verify binary on PATH (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: docker exec test-runner bash -c "command -v eim"

      - name: Verify version (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          VERSION=$(docker exec test-runner eim --do-not-track true --version 2>&1) || true
          echo "Output: ${VERSION}"
          EXPECTED="${{ steps.version.outputs.expected_version }}"
          if [ -n "$EXPECTED" ]; then
            echo "${VERSION}" | grep -q "${EXPECTED}" || { echo "FAIL: expected ${EXPECTED} in output"; exit 1; }
            echo "Version ${EXPECTED} confirmed"
          fi

      - name: Verify help output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: docker exec test-runner bash -c "eim --do-not-track true --help | grep -i install"

      - name: Verify package metadata (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: docker exec test-runner bash -c "${{ matrix.meta_cmd }}"

      - name: Uninstall package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: docker exec test-runner bash -c "${{ matrix.uninstall_cmd }}"

      - name: Copy EIM logs from container (Linux)
        if: matrix.os == 'ubuntu-latest' && always()
        run: |
          mkdir -p ./logs
          docker cp test-runner:/root/.local/share/eim/logs/. ./logs/ 2>/dev/null || true

      - name: Stop test container (Linux)
        if: matrix.os == 'ubuntu-latest' && always()
        run: |
          docker stop test-runner 2>/dev/null || true
          docker rm test-runner 2>/dev/null || true

      # ── macOS (Homebrew) ──

      - name: Install package (macOS)
        if: matrix.os == 'macos-latest'
        run: ${{ matrix.install_cmd }}

      - name: Verify binary on PATH (macOS)
        if: matrix.os == 'macos-latest'
        run: which eim

      - name: Verify version (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          VERSION=$(eim --do-not-track true --version 2>&1) || true
          echo "Output: ${VERSION}"
          EXPECTED="${{ steps.version.outputs.expected_version }}"
          if [ -n "$EXPECTED" ]; then
            echo "${VERSION}" | grep -q "${EXPECTED}" || { echo "FAIL: expected ${EXPECTED} in output"; exit 1; }
            echo "Version ${EXPECTED} confirmed"
          fi

      - name: Verify help output (macOS)
        if: matrix.os == 'macos-latest'
        run: eim --do-not-track true --help | grep -i install

      - name: Verify package metadata (macOS)
        if: matrix.os == 'macos-latest'
        run: ${{ matrix.meta_cmd }}

      - name: Uninstall package (macOS)
        if: matrix.os == 'macos-latest'
        run: ${{ matrix.uninstall_cmd }}

      - name: Copy EIM logs (macOS)
        if: matrix.os == 'macos-latest' && always()
        run: |
          mkdir -p ./logs
          cp ~/Library/Application\ Support/eim/logs/*.log ./logs/ 2>/dev/null || true

      # ── Windows (Scoop / WinGet) ──

      - name: Exclude workspace from Defender (Windows)
        if: matrix.os == 'windows-latest'
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Verify WinGet version on runner
        if: matrix.pkg_manager == 'winget' && steps.version.outputs.expected_version != ''
        id: winget-runner-verify
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.expected_version }}"
          Write-Host "Checking if WinGet index has version ${version}..."
          $result = winget show --id Espressif.EIM-CLI --version $version 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Version ${version} confirmed available in WinGet index"
            echo "confirmed=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Version ${version} not in WinGet index yet — clearing version assertion"
            echo "confirmed=false" >> $env:GITHUB_OUTPUT
          }
        continue-on-error: true

      - name: Install Scoop (Windows)
        if: matrix.pkg_manager == 'scoop'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          echo "$HOME\scoop\shims" >> $env:GITHUB_PATH

      - name: Download Scoop manifest
        if: matrix.pkg_manager == 'scoop'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.scoop_manifest_url }}" -OutFile eim-cli.json
          Write-Host "Downloaded manifest:"
          Get-Content eim-cli.json

      - name: Install package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          ${{ matrix.install_cmd }}
          $wingetLinks = "$env:LOCALAPPDATA\Microsoft\WinGet\Links"
          if (Test-Path $wingetLinks) {
            echo $wingetLinks >> $env:GITHUB_PATH
          }

      - name: Verify binary on PATH (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $eimPath = Get-Command eim.exe -ErrorAction SilentlyContinue
          if (-not $eimPath) { Write-Error "eim.exe not found on PATH"; exit 1 }
          Write-Host "Found: $($eimPath.Source)"

      - name: Verify version (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $output = & eim --do-not-track true --version 2>&1 | Out-String
          Write-Host "Output: $output"
          $expected = "${{ steps.version.outputs.expected_version }}"
          if ("${{ matrix.pkg_manager }}" -eq "winget" -and "${{ steps.winget-runner-verify.outputs.confirmed }}" -ne "true") {
            Write-Host "WinGet version not confirmed on runner — skipping assertion"
            $expected = ""
          }
          if ($expected -ne "") {
            if ($output -notmatch [regex]::Escape($expected)) {
              Write-Error "FAIL: expected $expected in output"
              exit 1
            }
            Write-Host "Version $expected confirmed"
          }

      - name: Verify help output (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $output = & eim --do-not-track true --help 2>&1 | Out-String
          if ($output -notmatch "install") { Write-Error "help output missing 'install' command"; exit 1 }
          Write-Host "Help output OK"

      - name: Verify package metadata (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ${{ matrix.meta_cmd }}

      - name: Uninstall package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ${{ matrix.uninstall_cmd }}

      - name: Copy EIM logs (Windows)
        if: matrix.os == 'windows-latest' && always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./logs | Out-Null
          Copy-Item -Path "$env:LOCALAPPDATA\eim\logs\*" -Destination "./logs/" -Force -ErrorAction SilentlyContinue

      # ── Upload logs ──

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pkg-manager-logs-${{ matrix.pkg_manager }}-${{ matrix.distro_name || matrix.os }}
          path: ./logs/
          if-no-files-found: ignore

  build-notification:
    name: Build notification
    needs: [setup-matrix, test]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      title: ${{ steps.msg.outputs.title }}
      body: ${{ steps.msg.outputs.body }}
    steps:
      - name: Fetch per-job results
        id: results
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JOBS_JSON=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --paginate --jq '[.jobs[] | select(.name | startswith("PkgMgr"))]')
          echo "jobs<<JOBS_EOF" >> $GITHUB_OUTPUT
          echo "$JOBS_JSON" >> $GITHUB_OUTPUT
          echo "JOBS_EOF" >> $GITHUB_OUTPUT

      - name: Build message
        id: msg
        shell: bash
        env:
          JOBS_JSON: ${{ steps.results.outputs.jobs }}
        run: |
          TEST_RESULT="${{ needs.test.result }}"
          VERSION="${{ needs.setup-matrix.outputs.resolved_stripped }}"
          WINGET_AVAILABLE="${{ needs.setup-matrix.outputs.winget_version_available }}"
          RUN_MODE="${{ inputs.run_mode }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"

          if [ -z "$RUN_MODE" ]; then RUN_MODE="nightly"; fi
          if [ -z "$VERSION" ]; then VERSION="latest"; fi

          if [ "$TEST_RESULT" = "success" ]; then
            ICON=":white_check_mark:"
            TITLE="Package Manager Tests — All Passed"
          elif [ "$TEST_RESULT" = "cancelled" ]; then
            ICON=":no_entry_sign:"
            TITLE="Package Manager Tests — Cancelled"
          else
            ICON=":x:"
            TITLE="Package Manager Tests — Some Failed"
          fi

          TABLE=$(python3 -c "
          import json, os

          jobs = json.loads(os.environ['JOBS_JSON'])
          winget_available = os.environ.get('WINGET_AVAILABLE', 'false')
          version = os.environ.get('VERSION', 'latest')

          rows = []
          for job in sorted(jobs, key=lambda j: j['name']):
              name = job['name']
              conclusion = job.get('conclusion', 'unknown')
              url = job.get('html_url', '')

              if conclusion == 'success':
                  status = ':white_check_mark: Passed'
              elif conclusion == 'failure':
                  status = ':x: Failed'
              elif conclusion == 'cancelled':
                  status = ':no_entry_sign: Cancelled'
              elif conclusion == 'skipped':
                  status = ':fast_forward: Skipped'
              else:
                  status = f':grey_question: {conclusion}'

              note = ''
              if 'winget' in name.lower():
                  if winget_available != 'true':
                      note = ' _(manifest not in index yet — version-agnostic)_'
                  elif conclusion == 'success':
                      note = f' _(v{version} confirmed)_'

              link = f'[{name}]({url})' if url else name
              rows.append(f'| {link} | {status}{note} |')

          table = '| Job | Result |\n|:---|:---|\n' + '\n'.join(rows)
          print(table)
          ")

          BODY="**Version:** \`${VERSION}\` | **Mode:** ${RUN_MODE} | **Branch:** \`${BRANCH}\`\n\n"
          BODY+="${TABLE}\n\n"
          BODY+=":link: [View full run](${RUN_URL})"

          echo "title=${ICON} ${TITLE}" >> $GITHUB_OUTPUT
          echo "body<<BODY_EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "BODY_EOF" >> $GITHUB_OUTPUT

  notify:
    name: Notify Mattermost
    needs: [build-notification]
    if: always() && needs.build-notification.result == 'success'
    uses: ./.github/workflows/notify_mattermost.yml
    with:
      title: ${{ needs.build-notification.outputs.title }}
      body: ${{ needs.build-notification.outputs.body }}
    secrets: inherit
