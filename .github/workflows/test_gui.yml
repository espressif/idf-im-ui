name: Autotest GUI

on:
  workflow_call:
    inputs:
      run_id:
        required: true
        type: string
      ref:
        required: true
        type: string
      run_extended:
        required: true
        type: string
        default: "false"

  workflow_dispatch:
    inputs:
      run_id:
        description: "The run id from which to take binaries"
        required: true
        type: string
      run_extended:
        description: "Run extended tests, use 'true' to enable"
        required: true
        type: string
        default: "false"

jobs:
  test-cli-in-gui:
    name: CLI in GUI (${{ matrix.package_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
            run_on: GitHub
          - os: windows-latest
            package_name: windows-x64
            run_on: GitHub
          - os: macos-latest
            package_name: macos-aarch64
            run_on: GitHub
          - os: ubuntu-24.04-arm
            package_name: linux-aarch64
            run_on: ExtraRunner
          - os: macos-15-intel
            package_name: macos-x64
            run_on: ExtraRunner

    steps:
      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eim-gui-${{ matrix.package_name }}-*
          path: ./artifacts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      # Non-Windows steps

      - name: Set up Python
        if: matrix.os != 'windows-latest'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.8"

      - name: Get CLI application version number (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          STRIPPED_TAG=${LATEST_TAG#v}
          echo "CLI_TAG=$STRIPPED_TAG" >> $GITHUB_ENV

      # Ubuntu

      - name: Check artifact and make it executable (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          ls -la ./artifacts/
          chmod +x artifacts/eim

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf ccache libffi-dev libssl-dev dfu-util libusb-1.0-0-dev libgcrypt20 libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0 webkit2gtk-driver

      - name: Run IDF basic install test script (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          python3 --version        
          export LOG_TO_FILE="true"
          export PACKAGE_NAME="${{ matrix.package_name }}"
          export EIM_CLI_PATH="../artifacts/eim"
          export EIM_CLI_VERSION="eim ${{ env.CLI_TAG }}"
          cd tests
          npm ci
          npm run test-CLI --file=CLI-GUI-basic
        continue-on-error: true

      # MacOS

      - name: Check artifact and make it executable (MacOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        run: |
          ls -la ./artifacts/
          chmod +x artifacts/eim.app/Contents/MacOS/eim

      - name: Install dependencies (MacOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        run: |
          brew install dfu-util libgcrypt glib pixman sdl2 libslirp

      - name: Run IDF basic install test script (MacOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        run: |
          python3 --version        
          export LOG_TO_FILE="true"
          export PACKAGE_NAME="${{ matrix.package_name }}"
          export EIM_CLI_PATH="../artifacts/eim.app/Contents/MacOS/eim"
          export EIM_CLI_VERSION="eim ${{ env.CLI_TAG }}"
          cd tests
          npm ci
          npm run test-CLI --file=CLI-GUI-basic
        continue-on-error: true

      # Windows steps

      - name: Get CLI application version number (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          git fetch --tags
          $LATEST_TAG = (git tag --sort=-creatordate | Where-Object { $_ -match '^v[0-9]+\.[0-9]+\.[0-9]+$' } | Select-Object -First 1)
          $STRIPPED_TAG = $LATEST_TAG -replace '^v', ''
          echo "CLI_TAG=$STRIPPED_TAG" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Check artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          ls ./artifacts/

      - name: Setup Python (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run IDF basic install test script (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python3 --version        
          $env:LOG_TO_FILE="true"
          $env:PACKAGE_NAME="${{ matrix.package_name }}"
          $env:EIM_CLI_PATH = "..\artifacts\eim.exe"
          $env:EIM_CLI_VERSION = "eim ${{ env.CLI_TAG }}"
          Set-Location -Path "./tests"
          Expand-Archive node_modules.zip
          npm run test-CLI-win --file=CLI-GUI-basic-win
        continue-on-error: true

      # Copy eim log files to standard location for easier access
      - name: Copy EIM Log files (ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'self-hosted'
        run: |
          cp ~/.local/share/eim/logs/*.log ./tests/
        continue-on-error: true

      - name: Copy EIM Log files (MacOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        run: |
          cp ~/Library/Application\ Support/eim/logs/*.log ./tests/
        continue-on-error: true

      - name: Copy EIM Log files (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Move-Item -Path "$env:LOCALAPPDATA\eim\logs\*" -Destination ".\tests\" -Force
        continue-on-error: true

      # Upload test results
      - name: Upload test results (non-Windows)
        uses: actions/upload-artifact@v4
        if: matrix.os != 'windows-latest'
        with:
          name: autotest-CLI-in-GUI-results-${{ matrix.package_name }}
          path: |
            ./tests/results-*.json
            ./tests/*.log

      - name: Upload test results (Windows)
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: autotest-CLI-in-GUI-results-${{ matrix.package_name }}
          path: |
            ./tests/results-*.json
            ./tests/*.log

      # Publish test results
      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: CLI-in-GUI-Autotests-${{ matrix.package_name }}
          path: ./tests/results-*.json
          path-replace-backslashes: "false"
          reporter: mocha-json
          fail-on-empty: true

  test-gui:
    name: GUI (${{ matrix.package_name }} ${{matrix.distro_name || ''}})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
            distro_name: ubuntu
          - os: ubuntu-24.04-arm
            package_name: linux-aarch64
            distro_name: ubuntu
          - os: windows-latest
            package_name: windows-x64
            distro_name: stock
          - os: windows-2022
            package_name: windows-x64
            distro_name: stock-2022
          - os: windows-latest
            package_name: windows-x64
            distro_name: scoop

    steps:
      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tauri-Driver
        run: |
          cargo install tauri-driver --locked

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eim-gui-${{ matrix.package_name }}-*
          path: ./artifacts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      # Non-Windows steps

      - name: Set up Python
        if: ${{ !startsWith(matrix.os, 'windows') }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.8"

      - name: Get GUI application version number (non-Windows)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          GUI_TAG=${LATEST_TAG#v}
          echo "GUI_TAG=$GUI_TAG" >> $GITHUB_ENV
          echo "Latest GUI tag to validate: $GUI_TAG"

      - name: Check artifact and make it executable (non-Windows)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: |
          ls -la ./artifacts/
          chmod +x ./artifacts/eim

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-driver xvfb

      - name: Start XVFB (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo Xvfb :99 -ac -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run prerequisites check (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |    
          export LOG_TO_FILE="true"
          export PREREQUISITES_OS="${{ matrix.distro_name || 'ubuntu' }}"
          export PACKAGE_NAME="${{ matrix.package_name }}"
          export EIM_GUI_PATH="${{ github.workspace }}/artifacts/eim"
          export EIM_GUI_VERSION="${{ env.GUI_TAG }}"
          cd tests
          npm ci
          npm run test-GUI --file=GUI-prerequisites
        continue-on-error: true

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf ccache libffi-dev libssl-dev dfu-util libusb-1.0-0-dev

      - name: Run python check (Ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -iv 'python' | tr '\n' ':' | sed 's/:$//')
          sudo mv /usr/bin/python3 /usr/bin/python3.bak 2>/dev/null || true
          sudo mv /bin/python3 /bin/python3.bak 2>/dev/null || true
          which -a python3 || echo "Python not found in PATH"
          export LOG_TO_FILE="true"
          export PACKAGE_NAME="${{ matrix.package_name }}"
          export EIM_GUI_PATH="${{ github.workspace }}/artifacts/eim"
          export EIM_GUI_VERSION="${{ env.GUI_TAG }}"
          cd tests
          npm run test-GUI --file=GUI-pythoncheck
          sudo mv /usr/bin/python3.bak /usr/bin/python3 2>/dev/null || true
          sudo mv /bin/python3.bak /bin/python3 2>/dev/null || true
        continue-on-error: true

      - name: Run IDF basic install test script using GUI (non-Windows)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: |
          python3 --version        
          export LOG_TO_FILE="true"
          export PACKAGE_NAME="${{ matrix.package_name }}"
          export EIM_GUI_PATH="${{ github.workspace }}/artifacts/eim"
          export EIM_GUI_VERSION="${{ env.GUI_TAG }}"
          cd tests
          npm run test-GUI --file=GUI-basic
        continue-on-error: true

      - name: Run IDF extended install test script using GUI (non-Windows)
        if: ${{ !startsWith(matrix.os, 'windows') && inputs.run_extended == 'true' }}
        run: |
          python3 --version        
          export LOG_TO_FILE="true"
          export PACKAGE_NAME="${{ matrix.package_name }}"
          export EIM_GUI_PATH="${{ github.workspace }}/artifacts/eim"
          export EIM_GUI_VERSION="${{ env.GUI_TAG }}"
          cd tests
          npm run test-GUI --file=GUI-extended
        continue-on-error: true

      # Windows steps

      - name: Get GUI application version number (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          git fetch --tags
          $LATEST_TAG = (git tag --sort=-creatordate | Where-Object { $_ -match '^v[0-9]+\.[0-9]+\.[0-9]+$' } | Select-Object -First 1)
          $GUI_TAG = $LATEST_TAG -replace '^v', ''
          echo "GUI_TAG=$GUI_TAG" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "Latest GUI tag to validate: $GUI_TAG"

      - name: Check artifact (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          ls ./artifacts/

      - name: Setup Python (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && matrix.distro_name != 'scoop' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Update WebView2 Runtime
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile 'setup.exe'
          Start-Process -FilePath setup.exe -Verb RunAs -Wait

      - name: Setup node modules (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          Set-Location -Path "./tests"
          Expand-Archive node_modules.zip

      - name: Collect Windows GUI environment diagnostics
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          $envReport = Join-Path $env:GITHUB_WORKSPACE "tests\windows-gui-environment.txt"
          $eimPath = Join-Path $env:GITHUB_WORKSPACE "artifacts\eim.exe"
          "Timestamp (UTC): $([DateTime]::UtcNow.ToString('o'))" | Out-File -FilePath $envReport -Encoding utf8
          "Runner OS: $env:RUNNER_OS" | Add-Content -Path $envReport
          "PATH: $env:PATH" | Add-Content -Path $envReport
          "" | Add-Content -Path $envReport
          "=== EIM binary details ===" | Add-Content -Path $envReport
          if (Test-Path $eimPath) {
            Get-Item $eimPath | Format-List FullName, Length, LastWriteTime | Out-String | Add-Content -Path $envReport
            Get-FileHash -Path $eimPath -Algorithm SHA256 | Format-List | Out-String | Add-Content -Path $envReport
          } else {
            "EIM binary not found at: $eimPath" | Add-Content -Path $envReport
          }
          "" | Add-Content -Path $envReport
          "=== Edge / driver details ===" | Add-Content -Path $envReport
          where.exe msedgedriver 2>&1 | Out-String | Add-Content -Path $envReport
          Get-Command msedgedriver -ErrorAction SilentlyContinue | Format-List * | Out-String | Add-Content -Path $envReport
          where.exe msedge 2>&1 | Out-String | Add-Content -Path $envReport
          $edgeVersion = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Edge\BLBeacon" -ErrorAction SilentlyContinue).version
          "Edge version (registry): $edgeVersion" | Add-Content -Path $envReport
          $webView2Version = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F1E7C13C-35E0-4A95-A444-73F3E6172E42}" -ErrorAction SilentlyContinue).pv
          "WebView2 Runtime version (registry): $webView2Version" | Add-Content -Path $envReport

      - name: Windows GUI preflight launch probe
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          $eimPath = Join-Path $env:GITHUB_WORKSPACE "artifacts\eim.exe"
          $stdoutPath = Join-Path $env:GITHUB_WORKSPACE "tests\eim-preflight-stdout.log"
          $stderrPath = Join-Path $env:GITHUB_WORKSPACE "tests\eim-preflight-stderr.log"
          $summaryPath = Join-Path $env:GITHUB_WORKSPACE "tests\eim-preflight-summary.log"

          "Timestamp (UTC): $([DateTime]::UtcNow.ToString('o'))" | Out-File -FilePath $summaryPath -Encoding utf8
          "EIM path: $eimPath" | Add-Content -Path $summaryPath

          if (-not (Test-Path $eimPath)) {
            "Preflight skipped: binary not found" | Add-Content -Path $summaryPath
            exit 0
          }

          $probe = Start-Process -FilePath $eimPath -ArgumentList "--do-not-track","true" -PassThru -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
          Start-Sleep -Seconds 15

          $stillRunning = Get-Process -Id $probe.Id -ErrorAction SilentlyContinue
          if ($stillRunning) {
            "Preflight result: process is still running after 15s (pid=$($probe.Id))" | Add-Content -Path $summaryPath
            Stop-Process -Id $probe.Id -Force -ErrorAction SilentlyContinue
          } else {
            "Preflight result: process exited early (pid=$($probe.Id), exit_code=$($probe.ExitCode))" | Add-Content -Path $summaryPath
          }

      - name: Remove python and git from PATH (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && matrix.distro_name == 'scoop' }}
        run: |
          $env:backup_path = $env:PATH
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch '[Pp]ython' }) -join ';'
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch '\\[Gg]it\\' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          echo "backup_path=$env:backup_path" >> $env:GITHUB_ENV

      - name: Run prerequisites check (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && matrix.distro_name == 'scoop' }}
        run: |
          $env:LOG_TO_FILE="true"   
          $env:PREREQUISITES_OS="windows"
          $env:PACKAGE_NAME="${{ matrix.package_name }}"
          $env:EIM_GUI_PATH = "${{ github.workspace }}\artifacts\eim.exe"
          $env:EIM_GUI_VERSION = "${{ env.GUI_TAG }}"
          Set-Location -Path "./tests"
          npm run test-GUI-win --file=GUI-prerequisites
        continue-on-error: true

      - name: Run python check (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && matrix.distro_name == 'scoop' }}
        run: |
          $env:LOG_TO_FILE="true"        
          $env:PACKAGE_NAME="${{ matrix.package_name }}"
          $env:EIM_GUI_PATH = "${{ github.workspace }}\artifacts\eim.exe"
          $env:EIM_GUI_VERSION = "${{ env.GUI_TAG }}"
          Set-Location -Path "./tests"
          npm run test-GUI-win --file=GUI-pythoncheck
          $scoopShims = "$env:USERPROFILE\scoop\shims"
          if (Test-Path $scoopShims) {
            $env:PATH = "$scoopShims;$env:PATH"
            echo "PATH=$env:PATH" >> $env:GITHUB_ENV
          }
        continue-on-error: true

      - name: Run IDF basic install test script using GUI (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          python3 --version        
          $env:LOG_TO_FILE="true"
          $env:PACKAGE_NAME="${{ matrix.package_name }}"
          $env:EIM_GUI_PATH = "${{ github.workspace }}\artifacts\eim.exe"
          $env:EIM_GUI_VERSION = "${{ env.GUI_TAG }}"
          Set-Location -Path "./tests"
          npm run test-GUI-win --file=GUI-basic
        continue-on-error: true

      - name: Run IDF extended install test script using GUI (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && inputs.run_extended == 'true' }}
        run: |
          python3 --version        
          $env:LOG_TO_FILE="true"
          $env:PACKAGE_NAME="${{ matrix.package_name }}"
          $env:EIM_GUI_PATH = "${{ github.workspace }}\artifacts\eim.exe"
          $env:EIM_GUI_VERSION = "${{ env.GUI_TAG }}"
          Set-Location -Path "./tests"
          npm run test-GUI-win --file=GUI-extended
        continue-on-error: true

      - name: Restore PATH (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && matrix.distro_name == 'scoop' }}
        run: |
          $env:PATH = $env:backup_path
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: Collect Windows crash diagnostics
        if: ${{ startsWith(matrix.os, 'windows') && always() }}
        run: |
          $diagRoot = Join-Path $env:GITHUB_WORKSPACE "tests\windows-crash-diagnostics"
          New-Item -ItemType Directory -Path $diagRoot -Force | Out-Null

          $appEvents = Join-Path $diagRoot "eventlog-application.txt"
          $sysEvents = Join-Path $diagRoot "eventlog-system.txt"
          $startTime = (Get-Date).AddHours(-2)

          Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=$startTime} -ErrorAction SilentlyContinue |
            Select-Object TimeCreated, Id, LevelDisplayName, ProviderName, Message |
            Format-List | Out-File -FilePath $appEvents -Encoding utf8

          Get-WinEvent -FilterHashtable @{LogName='System'; StartTime=$startTime} -ErrorAction SilentlyContinue |
            Select-Object TimeCreated, Id, LevelDisplayName, ProviderName, Message |
            Format-List | Out-File -FilePath $sysEvents -Encoding utf8

          $werReport = Join-Path $diagRoot "wer-paths.txt"
          $werPaths = @(
            "$env:LOCALAPPDATA\CrashDumps",
            "$env:LOCALAPPDATA\Microsoft\Windows\WER\ReportArchive",
            "$env:LOCALAPPDATA\Microsoft\Windows\WER\ReportQueue",
            "$env:PROGRAMDATA\Microsoft\Windows\WER\ReportArchive",
            "$env:PROGRAMDATA\Microsoft\Windows\WER\ReportQueue"
          )
          $werPaths | Out-File -FilePath $werReport -Encoding utf8

          foreach ($path in $werPaths) {
            if (Test-Path $path) {
              $safeName = ($path -replace "[:\\ ]", "_")
              $target = Join-Path $diagRoot $safeName
              New-Item -ItemType Directory -Path $target -Force | Out-Null
              Get-ChildItem -Path $path -Recurse -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 50 FullName, LastWriteTime, Length |
                Format-Table -AutoSize | Out-String |
                Out-File -FilePath (Join-Path $target "listing.txt") -Encoding utf8
            }
          }

      # Copy eim log files to standard location for easier access
      - name: Copy EIM Log files (ubuntu)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          cp ~/.local/share/eim/logs/*.log ./tests/
        continue-on-error: true

      - name: Copy EIM Log files (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          $destination = Join-Path $env:GITHUB_WORKSPACE "tests"
          $eimRoot = Join-Path $env:LOCALAPPDATA "eim"
          $eimLogs = Join-Path $eimRoot "logs"
          $copyReport = Join-Path $destination "windows-eim-log-copy-report.txt"

          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          "Timestamp (UTC): $([DateTime]::UtcNow.ToString('o'))" | Out-File -FilePath $copyReport -Encoding utf8
          "EIM root: $eimRoot" | Add-Content -Path $copyReport
          "EIM logs: $eimLogs" | Add-Content -Path $copyReport

          if (Test-Path $eimRoot) {
            "=== eim directory listing ===" | Add-Content -Path $copyReport
            Get-ChildItem -Path $eimRoot -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, LastWriteTime, Length |
              Format-Table -AutoSize | Out-String |
              Add-Content -Path $copyReport
          } else {
            "EIM root does not exist." | Add-Content -Path $copyReport
          }

          if (Test-Path $eimLogs) {
            Copy-Item -Path "$eimLogs\*" -Destination $destination -Force -ErrorAction Continue
            "Copied logs from $eimLogs to $destination" | Add-Content -Path $copyReport
          } else {
            "No logs directory found at $eimLogs" | Add-Content -Path $copyReport
            Write-Warning "No EIM logs directory found: $eimLogs"
          }
        continue-on-error: true

      # Upload test results
      - name: Upload test results (non-Windows)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(matrix.os, 'windows') }}
        with:
          name: autotest-GUI-results-${{ matrix.package_name }}-${{matrix.distro_name || ''}}
          path: |
            ./tests/results-*.json
            ./tests/*.png
            ./tests/*.log

      - name: Upload test results (Windows)
        uses: actions/upload-artifact@v4
        if: ${{ startsWith(matrix.os, 'windows') }}
        with:
          name: autotest-GUI-results-${{ matrix.package_name }}-${{matrix.distro_name || ''}}
          path: |
            ./tests/results-*.json
            ./tests/*.png
            ./tests/*.log

      # Publish test results
      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: GUI-Autotests-${{ matrix.package_name }}-${{matrix.distro_name || ''}}
          path: ./tests/results-*.json
          path-replace-backslashes: "false"
          reporter: mocha-json
          fail-on-empty: true
