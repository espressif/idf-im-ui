name: Release Build Workflow

on:
  workflow_call:
    inputs:
      is_release:
        type: boolean
        default: false
      version:
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup and Check merged PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check PR merge to master in last 24 hours
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== 'schedule') {
              core.info(`Workflow triggered by ${context.eventName}, skipping PR checks.`)
              core.setOutput('should_run', 'true');
              return;
            }
            const since = new Date(Date.now() - 24*60*60*1000).toISOString();
            const query = [
              "repo:" + context.repo.owner + "/" + context.repo.repo,
              "is:pr",
              "is:merged",
              `merged:>=${since}`
            ].join(" ")

            const results = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 1
            })

            const count = results.data.total_count
            core.info(`Found ${count} merged PR(s) in last 24 hours`)

            const shouldRun = count > 0 ? "true" : "false"
            core.info(`should_run = ${shouldRun}`)
            core.setOutput("should_run", shouldRun)

      - name: Set up build matrix
        id: set-matrix
        run: |
          matrix='{"include":[{"os":"ubuntu-22.04","package_name":"linux-x64","target":"","use_container":true},{"os":"ubuntu-22.04-arm","package_name":"linux-aarch64","target":"aarch64-unknown-linux-gnu","use_container":true},{"os":"windows-latest","package_name":"windows-x64","target":"","use_container":false},{"os":"macos-latest","package_name":"macos-aarch64","target":"aarch64-apple-darwin","use_container":false},{"os":"macos-15-intel","package_name":"macos-x64","target":"x86_64-apple-darwin","use_container":false}]}'
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build-test-lib:
    name: Build and Test Library (${{ matrix.package_name }})
    needs: setup
    if: (github.event_name != 'schedule' || needs.setup.outputs.should_run == 'true') && !contains(github.event.pull_request.labels.*.name, 'STOP_CI')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          vcpkg install openssl:x64-windows-static-md

      - name: Install dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev patchelf xdg-utils

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build and Test Library
        if: runner.os != 'Windows'
        run: |
          cd src-tauri
          cargo test --no-fail-fast --no-default-features --lib ${{ matrix.target && format('--target {0}', matrix.target) || '' }} 2>&1 | tee lib-result.txt
        shell: bash
        continue-on-error: true

      - name: Format test results
        if: runner.os != 'Windows'
        uses: hahihula/rust-test-results-formatter@v1.2.0
        with:
          results-file: "./src-tauri/lib-result.txt"

  build-cli-linux:
    name: Build CLI (Linux - ${{ matrix.package_name }})
    needs: [setup, build-test-lib]
    if: (needs.build-test-lib.result == 'success' || needs.build-test-lib.result == 'skipped')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
            target: ""
          - os: ubuntu-24.04-arm
            package_name: linux-aarch64
            target: aarch64-unknown-linux-musl
    container:
      image: clux/muslrust:stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libssl-dev patchelf zip xdg-utils gh

      - name: Build CLI
        env:
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          LZMA_API_STATIC: 1
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
          GIX_HTTP_TIMEOUT: "60"
          GIX_MAX_CONNECTIONS: "1"
          RUST_HTTP_PROTOCOL: "http/1.1"
        run: |
          cd src-tauri
          unset PKG_CONFIG_PATH && export ZLIB_STATIC=1 && export LZMA_API_STATIC=1 && export LIBZ_SYS_STATIC=1 && cargo build --release --no-default-features --features cli ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Create release directory
        run: mkdir -p release_cli/${{ matrix.package_name }}

      - name: Copy binary
        run: |
          cp src-tauri/target/${{ matrix.target || 'x86_64-unknown-linux-musl' }}/release/eim release_cli/${{ matrix.package_name }}/eim
          chmod +x release_cli/${{ matrix.package_name }}/eim
          cd release_cli/${{ matrix.package_name }}
          zip -r eim.zip eim
        shell: bash

      - name: Verify static linkage
        shell: bash
        run: |
          set -euo pipefail
          BIN="release_cli/${{ matrix.package_name }}/eim"

          echo "=== Checking static linkage for: $BIN ==="

          LDD_OUTPUT=$(ldd "$BIN" 2>&1 || true)
          echo "$LDD_OUTPUT"

          if echo "$LDD_OUTPUT" | grep -qE "not a dynamic executable|statically linked"; then
            echo "✓ Binary is statically linked."
          else
            if echo "$LDD_OUTPUT" | grep -qE "\.so"; then
              echo "✗ Dynamic dependencies detected — binary is NOT fully static:" >&2
              echo "$LDD_OUTPUT" >&2
              exit 1
            fi
            echo "✓ No dynamic libraries found — treating as static."
          fi

          if command -v readelf &>/dev/null; then
            INTERP=$(readelf -l "$BIN" 2>/dev/null | grep "INTERP" || true)
            if [ -n "$INTERP" ]; then
              echo "✗ ELF interpreter (dynamic linker) segment found:" >&2
              echo "$INTERP" >&2
              exit 1
            fi
            echo "✓ No ELF interpreter segment — confirmed static."
          fi

          if command -v file &>/dev/null; then
            FILE_OUT=$(file "$BIN")
            echo "$FILE_OUT"
            if echo "$FILE_OUT" | grep -q "dynamically linked"; then
              echo "✗ 'file' reports dynamically linked binary." >&2
              exit 1
            fi
          fi

      - name: Generate Completions
        shell: bash
        run: |
          set -euo pipefail
          cd src-tauri

          TRIPLE="${{ matrix.target }}"
          if [ -z "$TRIPLE" ]; then
            TRIPLE="x86_64-unknown-linux-musl"
          fi

          REAL_TGT="target/$TRIPLE/release"
          BIN="$REAL_TGT/eim"

          ls -la "$REAL_TGT"
          test -f "$BIN" || { echo "eim binary not found at $BIN" >&2; exit 1; }

          OUTDIR="$REAL_TGT/completions"
          mkdir -p "$OUTDIR"
          "$BIN" completions zsh > "$OUTDIR/_eim"
          "$BIN" completions bash > "$OUTDIR/eim.bash"
          "$BIN" completions fish > "$OUTDIR/eim.fish"
          "$BIN" completions elvish > "$OUTDIR/eim.elv"

          mkdir -p target/release/completions
          cp -a "$OUTDIR"/. target/release/completions/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: release_cli/${{ matrix.package_name }}/eim

      - name: Build offline_installer_builder
        run: |
          cd src-tauri
          cargo build --release --no-default-features --features offline --bin offline_installer_builder ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Copy offline_installer_builder binary
        run: |
          cp src-tauri/target/${{ matrix.target || 'x86_64-unknown-linux-musl' }}/release/offline_installer_builder release_cli/${{ matrix.package_name }}/offline_installer_builder
          chmod +x release_cli/${{ matrix.package_name }}/offline_installer_builder
          cd release_cli/${{ matrix.package_name }}
          zip -r offline_installer_builder.zip offline_installer_builder
        shell: bash

      - name: Upload offline_installer_builder artifacts
        uses: actions/upload-artifact@v7
        with:
          name: offline_installer_builder-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: release_cli/${{ matrix.package_name }}/offline_installer_builder

      - name: Prepare manpage for deb package
        if: inputs.is_release
        run: |
          mkdir -p src-tauri/man
          cp man/eim.1 src-tauri/man/
        shell: bash

      - name: Build CLI .deb package
        run: |
          cd src-tauri
          cargo install cargo-deb || true
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA:0:7}"
          fi

          echo "Using version: $VERSION"

          cargo deb --no-build --no-default-features --features cli \
            --target ${{ matrix.target || 'x86_64-unknown-linux-musl' }} \
            --deb-version $VERSION
        shell: bash

      - name: Upload CLI .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-deb
          path: src-tauri/target/debian/eim*.deb
          if-no-files-found: warn

      - name: Upload source and binary for RPM build
        uses: actions/upload-artifact@v7
        with:
          name: rpm-build-input-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: |
            release_cli/${{ matrix.package_name }}/eim
            src-tauri/Cargo.toml
            src-tauri/target/${{ matrix.target || 'x86_64-unknown-linux-musl' }}/release/eim
            src-tauri/target/release/completions/

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-cli-linux-armv7:
    name: Build CLI (Linux - linux-armv7)
    needs: [setup, build-test-lib, build-cli-linux]
    if: (needs.build-test-lib.result == 'success' || needs.build-test-lib.result == 'skipped') && (needs.build-cli-linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CROSS_TARGET: armv7-unknown-linux-musleabihf
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-armv7-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-armv7-cargo-

      - name: Build CLI
        env:
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          LZMA_API_STATIC: 1
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
          GIX_HTTP_TIMEOUT: "60"
          GIX_MAX_CONNECTIONS: "1"
          RUST_HTTP_PROTOCOL: "http/1.1"
        run: |
          cd src-tauri
          cross build --release --no-default-features --features cli --target ${{ env.CROSS_TARGET }}
        shell: bash

      - name: Create release directory
        run: mkdir -p release_cli/linux-armv7

      - name: Copy binary
        run: |
          cp src-tauri/target/${{ env.CROSS_TARGET }}/release/eim release_cli/linux-armv7/eim
          chmod +x release_cli/linux-armv7/eim
          cd release_cli/linux-armv7
          zip -r eim.zip eim
        shell: bash

      - name: Download completions from linux-x64 build
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-x64-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: /tmp/x64-cli-artifact/

      - name: Generate Completions from x64 binary
        shell: bash
        run: |
          set -euo pipefail
          X64_BIN="/tmp/x64-cli-artifact/eim"
          chmod +x "$X64_BIN"

          cd src-tauri
          OUTDIR="target/${{ env.CROSS_TARGET }}/release/completions"
          mkdir -p "$OUTDIR"

          "$X64_BIN" completions zsh    > "$OUTDIR/_eim"
          "$X64_BIN" completions bash   > "$OUTDIR/eim.bash"
          "$X64_BIN" completions fish   > "$OUTDIR/eim.fish"
          "$X64_BIN" completions elvish > "$OUTDIR/eim.elv"

          mkdir -p target/release/completions
          cp -a "$OUTDIR"/. target/release/completions/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-linux-armv7-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: release_cli/linux-armv7/eim

      - name: Build offline_installer_builder
        env:
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          LZMA_API_STATIC: 1
          GIX_HTTP_TIMEOUT: "60"
          GIX_MAX_CONNECTIONS: "1"
          RUST_HTTP_PROTOCOL: "http/1.1"
        run: |
          cd src-tauri
          cross build --release --no-default-features --features offline --bin offline_installer_builder --target ${{ env.CROSS_TARGET }}
        shell: bash

      - name: Copy offline_installer_builder binary
        run: |
          cp src-tauri/target/${{ env.CROSS_TARGET }}/release/offline_installer_builder release_cli/linux-armv7/offline_installer_builder
          chmod +x release_cli/linux-armv7/offline_installer_builder
          cd release_cli/linux-armv7
          zip -r offline_installer_builder.zip offline_installer_builder
        shell: bash

      - name: Upload offline_installer_builder artifacts
        uses: actions/upload-artifact@v7
        with:
          name: offline_installer_builder-linux-armv7-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: release_cli/linux-armv7/offline_installer_builder

      - name: Prepare manpage for deb package
        if: inputs.is_release
        run: |
          mkdir -p src-tauri/man
          cp man/eim.1 src-tauri/man/
        shell: bash

      - name: Build CLI .deb package
        run: |
          cd src-tauri
          cargo install cargo-deb || true

          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA:0:7}"
          fi

          echo "Using version: $VERSION"

          cargo deb --no-build --no-strip --no-default-features --features cli \
            --target ${{ env.CROSS_TARGET }} \
            --deb-version $VERSION
        shell: bash

      - name: Upload CLI .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-linux-armv7-${{ (inputs.is_release && inputs.version) || github.run_number }}-deb
          path: src-tauri/target/debian/eim*.deb
          if-no-files-found: warn

      - name: Upload source and binary for RPM build
        uses: actions/upload-artifact@v7
        with:
          name: rpm-build-input-linux-armv7-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: |
            release_cli/linux-armv7/eim
            src-tauri/Cargo.toml
            src-tauri/target/${{ env.CROSS_TARGET }}/release/eim
            src-tauri/target/release/completions/

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-cli-rpm:
    name: Build CLI RPM (${{ matrix.package_name }})
    needs: [build-cli-linux, build-cli-linux-armv7]
    if: needs.build-cli-linux.result == 'success'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    container:
      image: fedora:latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
            target: "x86_64-unknown-linux-musl"
            rpm_arch: x86_64
          - os: ubuntu-24.04-arm
            package_name: linux-aarch64
            target: "aarch64-unknown-linux-musl"
            rpm_arch: aarch64
          - os: ubuntu-latest
            package_name: linux-armv7
            target: "armv7-unknown-linux-musleabihf"
            rpm_arch: armv7hl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Fedora dependencies
        run: |
          dnf install -y rpm-build rpmdevtools gcc curl gh git zip

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-generate-rpm
        run: |
          source "$HOME/.cargo/env"
          cargo install cargo-generate-rpm

      - name: Download built binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rpm-build-input-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: rpm-input/

      - name: Prepare build tree for cargo-generate-rpm
        shell: bash
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env"

          TARGET="${{ matrix.target }}"
          RELEASE_DIR="src-tauri/target/${TARGET}/release"
          mkdir -p "$RELEASE_DIR"

          cp rpm-input/release_cli/${{ matrix.package_name }}/eim "$RELEASE_DIR/eim"
          chmod +x "$RELEASE_DIR/eim"

          if [ -d "rpm-input/src-tauri/target/release/completions" ]; then
            mkdir -p src-tauri/target/release/completions
            cp -a rpm-input/src-tauri/target/release/completions/. src-tauri/target/release/completions/
            mkdir -p "$RELEASE_DIR/completions"
            cp -a rpm-input/src-tauri/target/release/completions/. "$RELEASE_DIR/completions/"
          fi

          echo "Build tree prepared:"
          find "$RELEASE_DIR" -type f

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA:0:7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build CLI .rpm package
        shell: bash
        run: |
          source "$HOME/.cargo/env"
          cd src-tauri

          mkdir -p ~/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cargo generate-rpm \
            --target ${{ matrix.target }} \
            --payload-compress gzip \
            --set-metadata 'release = "1"' \
            --set-metadata 'requires = {git = "*", wget = "*", flex = "*", cmake = "*", bison = "*", gperf = "*", ccache = "*", libffi-devel = "*", openssl-devel = "*", dfu-util = "*", libusb = "*"}'

          echo "Generated RPM files:"
          find target -name "*.rpm" -type f

      - name: Collect RPM artifacts
        id: find-rpms
        run: |
          RPM_DIR="rpm_output"
          mkdir -p "$RPM_DIR"
          find src-tauri/target -name "*.rpm" -type f -exec cp {} "$RPM_DIR/" \;

          echo "Contents of $RPM_DIR:"
          ls -la "$RPM_DIR"/

          if [ -d "$RPM_DIR" ] && [ "$(ls -A $RPM_DIR)" ]; then
            echo "rpm_files_found=true" >> $GITHUB_OUTPUT
          else
            echo "rpm_files_found=false" >> $GITHUB_OUTPUT
            echo "No RPM files found!" >&2
            exit 1
          fi

      - name: Upload RPM artifacts
        if: steps.find-rpms.outputs.rpm_files_found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-rpm
          path: rpm_output/*.rpm
          if-no-files-found: warn

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-cli-pacman:
    name: Build CLI pacman (${{ matrix.package_name }})
    needs: [build-cli-linux, build-cli-linux-armv7]
    if: needs.build-cli-linux.result == 'success'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
            pacman_arch: x86_64
            image: archlinux:latest
          - os: ubuntu-22.04-arm
            package_name: linux-aarch64
            pacman_arch: aarch64
            image: menci/archlinuxarm:latest
          - os: ubuntu-latest
            package_name: linux-armv7
            pacman_arch: armv7h
            image: archlinux:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Arch dependencies
        run: |
          pacman -Sy --noconfirm --overwrite '*' base-devel curl git fakeroot github-cli

      - name: Download built binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rpm-build-input-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: pacman-input/

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0.${GITHUB_SHA:0:7}"
          fi
          # pacman doesn't allow '-' in pkgver; replace with '.'
          VERSION="${VERSION//-/.}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Create pacman package for CLI
        shell: bash
        run: |
          set -euo pipefail

          PKG_VERSION="${{ steps.version.outputs.version }}"
          PKG_REL="1"
          PACMAN_ARCH="${{ matrix.pacman_arch }}"
          PKG_NAME="eim-cli"

          BIN_SRC="pacman-input/release_cli/${{ matrix.package_name }}/eim"
          if [ ! -f "$BIN_SRC" ]; then
            BIN_SRC=$(find pacman-input -type f -name "eim" -not -path "*/completions/*" | head -1)
          fi

          if [ -z "$BIN_SRC" ] || [ ! -f "$BIN_SRC" ]; then
            echo "Could not find eim binary in artifact" >&2
            find pacman-input -type f
            exit 1
          fi

          echo "Using binary: $BIN_SRC"

          PKG_DIR=$(mktemp -d)
          mkdir -p "$PKG_DIR/usr/bin"
          cp "$BIN_SRC" "$PKG_DIR/usr/bin/eim"
          chmod +x "$PKG_DIR/usr/bin/eim"

          COMPLETIONS_SRC="pacman-input/src-tauri/target/release/completions"
          if [ -d "$COMPLETIONS_SRC" ]; then
            mkdir -p "$PKG_DIR/usr/share/bash-completion/completions"
            mkdir -p "$PKG_DIR/usr/share/zsh/site-functions"
            mkdir -p "$PKG_DIR/usr/share/fish/vendor_completions.d"
            [ -f "$COMPLETIONS_SRC/eim.bash" ] && cp "$COMPLETIONS_SRC/eim.bash" "$PKG_DIR/usr/share/bash-completion/completions/eim"
            [ -f "$COMPLETIONS_SRC/_eim" ]     && cp "$COMPLETIONS_SRC/_eim"     "$PKG_DIR/usr/share/zsh/site-functions/_eim"
            [ -f "$COMPLETIONS_SRC/eim.fish" ] && cp "$COMPLETIONS_SRC/eim.fish" "$PKG_DIR/usr/share/fish/vendor_completions.d/eim.fish"
          fi

          if [ -f "man/eim.1" ]; then
            mkdir -p "$PKG_DIR/usr/share/man/man1"
            cp man/eim.1 "$PKG_DIR/usr/share/man/man1/eim.1"
            gzip -9 "$PKG_DIR/usr/share/man/man1/eim.1"
          fi

          ISIZE=$(du -sb "$PKG_DIR" | awk '{print $1}')

          {
            printf 'pkgname = %s\n'  "${PKG_NAME}"
            printf 'pkgver = %s-%s\n' "${PKG_VERSION}" "${PKG_REL}"
            printf 'pkgdesc = %s\n'  "Espressif IDF Installation Manager (CLI)"
            printf 'url = %s\n'      "https://github.com/espressif/idf-im-ui"
            printf 'builddate = %s\n' "$(date +%s)"
            printf 'packager = %s\n' "Espressif Systems CI <[email protected]>"
            printf 'size = %s\n'     "${ISIZE}"
            printf 'arch = %s\n'     "${PACMAN_ARCH}"
            printf 'license = %s\n'  "MIT"
            for dep in git wget flex cmake bison gperf ccache libffi openssl dfu-util libusb; do
              printf 'depend = %s\n' "$dep"
            done
          } > "$PKG_DIR/.PKGINFO"

          echo "=== Generated .PKGINFO ==="
          cat -A "$PKG_DIR/.PKGINFO"
          echo "=========================="

          cd "$PKG_DIR"
          LANG=C bsdtar -czf .MTREE \
            --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            .PKGINFO usr

          OUT_DIR="$GITHUB_WORKSPACE/pacman_output"
          mkdir -p "$OUT_DIR"
          PKG_FILE="$OUT_DIR/${PKG_NAME}-${PKG_VERSION}-${PKG_REL}-${PACMAN_ARCH}.pkg.tar.zst"

          if command -v zstd >/dev/null 2>&1; then
            tar --zstd -cf "$PKG_FILE" .PKGINFO .MTREE usr
          else
            PKG_FILE="${PKG_FILE%.zst}.gz"
            tar -czf "$PKG_FILE" .PKGINFO .MTREE usr
          fi

          ls -la "$OUT_DIR"
          echo "Built pacman package: $PKG_FILE"

      - name: Upload pacman artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-pacman
          path: pacman_output/*.pkg.tar.*
          if-no-files-found: warn

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-cli:
    name: Build CLI (${{ matrix.package_name }})
    needs: [setup, build-test-lib]
    if: (needs.build-test-lib.result == 'success' || needs.build-test-lib.result == 'skipped')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            package_name: windows-x64
            target: ""
          - os: macos-latest
            package_name: macos-aarch64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            package_name: macos-x64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust (stable for macos-latest)
        uses: dtolnay/rust-toolchain@stable
        if: matrix.os == 'macos-latest'
        with:
          targets: ${{ matrix.target }}

      - name: Set up Rust (stable for macos-15-intel)
        uses: dtolnay/rust-toolchain@stable
        if: matrix.os == 'macos-15-intel'
        with:
          targets: ${{ matrix.target }}

      - name: Set up Rust (stable for Windows)
        uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'Windows'

      - name: Set up Perl (Windows)
        if: runner.os == 'Windows'
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.38"

      - name: Install Perl dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cpan App::cpanminus
          cpanm --force Locale::Maketext::Simple
          cpanm --force Text::Template
          cpanm --force Params::Check
          cpanm --force IPC::Cmd
          perl -MLocale::Maketext::Simple -e "print 'Locale::Maketext::Simple loaded successfully\n'"
          perl -MText::Template -e "print 'Text::Template loaded successfully\n'"
          perl -MParams::Check -e "print 'Params::Check loaded successfully\n'"
          perl -MIPC::Cmd -e "print 'IPC::Cmd loaded successfully\n'"
          $perl_path = (Get-Command perl).Source
          $perl_lib_path = Join-Path (Split-Path (Split-Path $perl_path)) "site\lib"
          echo "PERL5LIB=$perl_lib_path" >> $env:GITHUB_ENV
          echo "PERL=$perl_path" >> $env:GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build CLI (Windows)
        if: runner.os == 'Windows'
        env:
          OPENSSL_DIR: 'C:\vcpkg\installed\x64-windows-static-md'
          OPENSSL_LIB_DIR: 'C:\vcpkg\installed\x64-windows-static-md\lib'
          OPENSSL_INCLUDE_DIR: 'C:\vcpkg\installed\x64-windows-static-md\include'
          OPENSSL_STATIC: "1"
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
        run: |
          cd src-tauri
          cargo build --release --no-default-features --features cli ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Build CLI (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
          GIX_HTTP_TIMEOUT: "60"
          GIX_MAX_CONNECTIONS: "1"
          RUST_HTTP_PROTOCOL: "http/1.1"
        run: |
          cd src-tauri
          unset PKG_CONFIG_PATH && export ZLIB_STATIC=1 && export LZMA_API_STATIC=1 && export LIBZ_SYS_STATIC=1 && cargo build --release --no-default-features --features cli ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Create release directory
        run: mkdir -p release_cli/${{ matrix.package_name }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: copy src-tauri\target\release\eim.exe release_cli\${{ matrix.package_name }}\eim.exe
        shell: cmd

      - name: Copy binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/eim release_cli/${{ matrix.package_name }}/eim
          chmod +x release_cli/${{ matrix.package_name }}/eim
          cd release_cli/${{ matrix.package_name }}
          zip -r eim.zip eim
        shell: bash

      - name: Install .NET 8 SDK and AzureSignTool
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dotnet
          cd dotnet
          $dotnet_url="https://download.visualstudio.microsoft.com/download/pr/5af098e1-e433-4fda-84af-3f54fd27c108/6bd1c6e48e64e64871957289023ca590/dotnet-sdk-8.0.302-win-x64.zip"
          Invoke-WebRequest -Uri $dotnet_url -OutFile dotnet-sdk-8.0.302-win-x64.zip
          Expand-Archive -LiteralPath .\dotnet-sdk-8.0.302-win-x64.zip -DestinationPath .
          $Env:DOTNET_ROOT="$($(Get-Location).Path)\dotnet-sdk-8.0.302-win-x64"
          $Env:PATH="$Env:DOTNET_ROOT;$Env:PATH"
          $Env:DOTNET_SKIP_FIRST_TIME_EXPERIENCE=$true
          dotnet tool install --global AzureSignTool
          cd ..

      - name: Sign Windows Binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "release_cli\${{ matrix.package_name }}\eim.exe"
          if (-not (Test-Path $exePath)) { throw "eim.exe not found at $exePath" }

          $Env:DOTNET_ROOT="$PWD\dotnet\dotnet-sdk-8.0.302-win-x64"
          $Env:PATH="$Env:DOTNET_ROOT;$Env:PATH"

          AzureSignTool.exe sign `
            -kvu "${{ secrets.AZURE_KEYVAULT_URI }}" `
            -kvc "${{ secrets.AZURE_KEYVAULT_CERT_NAME }}" `
            -kvi "${{ secrets.AZURE_CLIENT_ID }}" `
            -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" `
            --azure-key-vault-tenant-id "${{ secrets.AZURE_TENANT_ID }}" `
            -tr http://timestamp.globalsign.com/tsa/advanced `
            -td sha256 `
            "$exePath"

      - name: Verify Signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "release_cli\${{ matrix.package_name }}\eim.exe"
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Name "signtool.exe" | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\$signtool" verify `
          /pa `
          "$exePath"

      - name: Sign files
        uses: espressif/release-sign@master
        if: startsWith(matrix.os, 'macos') && inputs.is_release
        with:
          path: ./release_cli/${{ matrix.package_name }}
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          macos-entitlements: eim.entitlement
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eim-cli-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: release_cli/${{ matrix.package_name }}/eim${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Build offline_installer_builder (Windows)
        if: runner.os == 'Windows'
        env:
          OPENSSL_DIR: 'C:\vcpkg\installed\x64-windows-static-md'
          OPENSSL_LIB_DIR: 'C:\vcpkg\installed\x64-windows-static-md\lib'
          OPENSSL_INCLUDE_DIR: 'C:\vcpkg\installed\x64-windows-static-md\include'
          OPENSSL_STATIC: "1"
        run: |
          cd src-tauri
          cargo build --release --no-default-features --features offline --bin offline_installer_builder ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Build offline_installer_builder (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          LZMA_API_STATIC: 1
        run: |
          cd src-tauri
          unset PKG_CONFIG_PATH && cargo build --release --no-default-features --features offline --bin offline_installer_builder ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        shell: bash

      - name: Copy offline_installer_builder binary (Windows)
        if: runner.os == 'Windows'
        run: copy src-tauri\target\release\offline_installer_builder.exe release_cli\${{ matrix.package_name }}\offline_installer_builder.exe
        shell: cmd

      - name: Copy offline_installer_builder binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/offline_installer_builder release_cli/${{ matrix.package_name }}/offline_installer_builder
          chmod +x release_cli/${{ matrix.package_name }}/offline_installer_builder
          cd release_cli/${{ matrix.package_name }}
          zip -r offline_installer_builder.zip offline_installer_builder
        shell: bash

      - name: Sign Windows offline_installer_builder Binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "release_cli\${{ matrix.package_name }}\offline_installer_builder.exe"
          if (-not (Test-Path $exePath)) { throw "offline_installer_builder.exe not found at $exePath" }

          $Env:DOTNET_ROOT="$PWD\dotnet\dotnet-sdk-8.0.302-win-x64"
          $Env:PATH="$Env:DOTNET_ROOT;$Env:PATH"

          AzureSignTool.exe sign `
            -kvu "${{ secrets.AZURE_KEYVAULT_URI }}" `
            -kvc "${{ secrets.AZURE_KEYVAULT_CERT_NAME }}" `
            -kvi "${{ secrets.AZURE_CLIENT_ID }}" `
            -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" `
            --azure-key-vault-tenant-id "${{ secrets.AZURE_TENANT_ID }}" `
            -tr http://timestamp.globalsign.com/tsa/advanced `
            -td sha256 `
            "$exePath"

      - name: Verify offline_installer_builder Signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "release_cli\${{ matrix.package_name }}\offline_installer_builder.exe"
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Name "signtool.exe" | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\$signtool" verify `
          /pa `
          "$exePath"

      - name: Codesign macOS offline_installer_builder Binary
        uses: espressif/release-sign@master
        if: startsWith(matrix.os, 'macos') && inputs.is_release
        with:
          path: ./release_cli/${{ matrix.package_name }}/offline_installer_builder
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          macos-entitlements: eim.entitlement
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: Upload offline_installer_builder build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: offline_installer_builder-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: release_cli/${{ matrix.package_name }}/offline_installer_builder${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-offline-archives:
    name: Build Offline Archives
    needs: [build-cli, build-cli-linux, build-cli-linux-armv7]
    if: (needs.build-cli.result == 'success' || needs.build-cli.result == 'skipped') && (needs.build-cli-linux.result == 'success' || needs.build-cli-linux.result == 'skipped') && (needs.build-cli-linux-armv7.result == 'success' || needs.build-cli-linux-armv7.result == 'skipped') && inputs.is_release
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/build_offline_installer_archives.yaml
    with:
      ref: ${{ github.ref }}
      run_id: ${{ github.run_id }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}

  build-gui:
    name: Build GUI (${{ matrix.package_name }})
    needs: [setup, build-test-lib]
    if: needs.build-test-lib.result == 'success' || needs.build-test-lib.result == 'skipped'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          vcpkg install openssl:x64-windows-static-md

      - name: Install dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev patchelf xdg-utils gh

      - name: Install gh (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install gh

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run GUI Tests
        if: runner.os != 'Windows'
        run: |
          cd src-tauri
          cargo test --no-fail-fast --no-default-features --features cli,gui --bin eim 2>&1 | tee gui-bin-result.txt
        shell: bash
        continue-on-error: true

      - name: Format GUI test results
        if: runner.os != 'Windows'
        uses: hahihula/rust-test-results-formatter@v1.2.0
        with:
          results-file: "./src-tauri/gui-bin-result.txt"

      - name: Install frontend dependencies
        run: yarn install

      - name: Import macOS codesign certs
        if: startsWith(matrix.os, 'macos')
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          keychain: build

      - name: Remove offline_installer_builder from Cargo.toml for GUI build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          sed -i.bak '/^\[\[bin\]\]$/{ N; N; N; /name = "offline_installer_builder"/d; }' src-tauri/Cargo.toml ||
          sed -i.bak '/name = "offline_installer_builder"/{ N; N; s/.*\n.*\n.*//; }' src-tauri/Cargo.toml ||
          sed -i.bak '/name = "offline_installer_builder"/,+2d' src-tauri/Cargo.toml
          sed -i.bak '/^\[\[bin\]\]$/{ N; /path = "src\/offline_installer_builder\.rs"/d; }' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          cat src-tauri/Cargo.toml

      - name: Remove offline_installer_builder from Cargo.toml for GUI build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $content = Get-Content "src-tauri/Cargo.toml" -Raw
          $pattern = '(?s)\[\[bin\]\]\s*name = "offline_installer_builder"\s*path = "src/offline_installer_builder\.rs"\s*required-features = \["offline"\]\s*(?=\n(\[\[bin\]\]|\[|$))'
          $newContent = $content -replace $pattern, ''
          Set-Content "src-tauri/Cargo.toml" -Value $newContent
          Get-Content "src-tauri/Cargo.toml"

      - name: Build GUI (macOS) - release
        if: startsWith(matrix.os, 'macos') && inputs.is_release
        env:
          APPLE_ID: ${{ secrets.MACOS_CS_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
        run: |
          security create-keychain -p espressif notary.keychain
          security default-keychain -s notary.keychain
          security unlock-keychain -p espressif notary.keychain
          unset PKG_CONFIG_PATH && export ZLIB_STATIC=1 && export LZMA_API_STATIC=1 && export LIBZ_SYS_STATIC=1 && yarn tauri build

      - name: Build GUI (macOS) - non-release
        if: startsWith(matrix.os, 'macos') && !inputs.is_release
        env:
          LIBZ_SYS_STATIC: 1
          ZLIB_STATIC: 1
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
        run: unset PKG_CONFIG_PATH && export ZLIB_STATIC=1 && export LZMA_API_STATIC=1 && export LIBZ_SYS_STATIC=1 && yarn tauri build

      - name: Build GUI (non-macOS)
        if: ${{ !startsWith(matrix.os, 'macos') }}
        env:
          APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}
        run: yarn tauri build

      - name: Install .NET 8 SDK and AzureSignTool (GUI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dotnet
          cd dotnet
          $dotnet_url="https://download.visualstudio.microsoft.com/download/pr/5af098e1-e433-4fda-84af-3f54fd27c108/6bd1c6e48e64e64871957289023ca590/dotnet-sdk-8.0.302-win-x64.zip"
          Invoke-WebRequest -Uri $dotnet_url -OutFile dotnet-sdk-8.0.302-win-x64.zip
          Expand-Archive -LiteralPath .\dotnet-sdk-8.0.302-win-x64.zip -DestinationPath .
          $Env:DOTNET_ROOT="$($(Get-Location).Path)\dotnet-sdk-8.0.302-win-x64"
          $Env:PATH="$Env:DOTNET_ROOT;$Env:PATH"
          $Env:DOTNET_SKIP_FIRST_TIME_EXPERIENCE=$true
          dotnet tool install --global AzureSignTool
          cd ..

      - name: Sign Windows Binary (GUI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "src-tauri\target\release\eim.exe"
          if (-not (Test-Path $exePath)) { throw "eim.exe not found at $exePath" }

          $Env:DOTNET_ROOT="$PWD\dotnet\dotnet-sdk-8.0.302-win-x64"
          $Env:PATH="$Env:DOTNET_ROOT;$Env:PATH"

          AzureSignTool.exe sign `
            -kvu "${{ secrets.AZURE_KEYVAULT_URI }}" `
            -kvc "${{ secrets.AZURE_KEYVAULT_CERT_NAME }}" `
            -kvi "${{ secrets.AZURE_CLIENT_ID }}" `
            -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" `
            --azure-key-vault-tenant-id "${{ secrets.AZURE_TENANT_ID }}" `
            -tr http://timestamp.globalsign.com/tsa/advanced `
            -td sha256 `
            "$exePath"

      - name: Verify Signature (GUI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "src-tauri\target\release\eim.exe"
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Name "signtool.exe" | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\$signtool" verify `
          /pa `
          "$exePath"

      - name: Handle Linux artifacts
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          chmod +x src-tauri/target/release/eim
          chmod +x src-tauri/target/release/bundle/appimage/*.AppImage
          cd src-tauri/target/release/
          zip -r eim.zip eim

      - name: Handle macOS artifacts
        if: startsWith(matrix.os, 'macos')
        run: |
          chmod +x src-tauri/target/release/bundle/macos/eim.app
          cd src-tauri/target/release/bundle/macos
          zip -r eim.zip eim.app

      - name: Upload Linux artifacts
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: |
            src-tauri/target/release/eim
          if-no-files-found: warn

      - name: Upload Linux artifacts - .deb
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-deb
          path: |
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload GUI RPM for Fedora repackage
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: gui-rpm-repackage-input-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: |
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/eim
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: |
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload macOS artifacts - dmg
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: |
            src-tauri/target/release/eim.exe
          if-no-files-found: warn

      - name: Upload Windows artifacts - msi
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-gui-rpm:
    name: Repackage GUI RPM (${{ matrix.package_name }})
    needs: [build-gui]
    if: needs.build-gui.result == 'success'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    container:
      image: fedora:latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
          - os: ubuntu-22.04-arm
            package_name: linux-aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Fedora dependencies
        run: |
          dnf install -y rpm-build rpmdevtools rpm-sign gh git

      - name: Download Tauri-generated RPM
        uses: actions/download-artifact@v8
        with:
          name: gui-rpm-repackage-input-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: gui-rpm-input/

      - name: Repackage RPM without python upper bound
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="1"

          ORIG_RPM=$(find gui-rpm-input -name "*.rpm" -type f -print -quit)

          if [ -z "$ORIG_RPM" ]; then
            echo "No GUI RPM found in artifacts, skipping repackage"
            echo "gui_rpm_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ORIG_RPM="$(realpath "$ORIG_RPM")"
          echo "Original RPM: $ORIG_RPM"
          echo "Original dependencies:"
          rpm -qpR "$ORIG_RPM" || true

          if ! rpm -qpR "$ORIG_RPM" 2>/dev/null | grep -i "python.*<"; then
            echo "RPM does not have python upper bound issue, using as-is"
            mkdir -p "$GITHUB_WORKSPACE/gui_rpm_output"
            cp "$ORIG_RPM" "$GITHUB_WORKSPACE/gui_rpm_output/"
            echo "gui_rpm_available=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found python upper bound in RPM, repackaging..."

          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"
          rpm2cpio "$ORIG_RPM" | cpio -idmv

          rpm_tag() {
            local val
            val=$(rpm -qp --queryformat "%{$1}" "$ORIG_RPM" 2>/dev/null || true)
            if [ -z "$val" ] || [ "$val" = "(none)" ]; then
              echo "$2"
            else
              echo "$val"
            fi
          }

          NAME=$(rpm_tag NAME "eim")
          VERSION=$(rpm_tag VERSION "0.0.0")
          RELEASE=$(rpm_tag RELEASE "1")
          SUMMARY=$(rpm_tag SUMMARY "Espressif IDF Installation Manager")
          LICENSE=$(rpm_tag LICENSE "MIT")
          ARCH=$(rpm_tag ARCH "x86_64")
          DESCRIPTION=$(rpm_tag DESCRIPTION "Espressif IDF Installation Manager GUI application")

          mapfile -t REQ_LINES < <(
            rpm -qpR "$ORIG_RPM" 2>/dev/null \
              | grep -v "python.*<" \
              | grep -v "^rpmlib(" \
              | sort -u
          )

          rpmdev-setuptree
          SPEC_FILE="$HOME/rpmbuild/SPECS/eim-gui.spec"

          {
            echo "Name:           ${NAME}"
            echo "Version:        ${VERSION}"
            echo "Release:        ${RELEASE}"
            echo "Summary:        ${SUMMARY}"
            echo "License:        ${LICENSE}"
            echo "AutoReqProv:    no"
            echo ""
            for req in "${REQ_LINES[@]}"; do
              req=$(echo "$req" | xargs)
              [ -n "$req" ] && echo "Requires:       ${req}"
            done
            echo ""
            echo "%description"
            echo "${DESCRIPTION}"
            echo ""
            echo "%install"
            echo "cp -a ${WORK_DIR}/* %{buildroot}/"
            echo ""
            echo "%files"
            find . -type f -o -type l | sed 's|^\./|/|'
            # List only package-owned directories; skip system dirs owned by 'filesystem'
            find . -mindepth 1 -type d | sed 's|^\./||' | grep -Ev \
              '^(usr|usr/bin|usr/sbin|usr/lib|usr/lib64|usr/libexec|usr/include|usr/share|usr/share/doc|usr/share/man|usr/share/man/man1|usr/share/applications|usr/share/icons|usr/share/icons/hicolor|usr/share/icons/hicolor/[^/]+|usr/share/icons/hicolor/[^/]+/apps|etc|var|opt|run|tmp|home|root|boot|srv|proc|sys|dev)$' \
              | sed 's|^|%dir /|'
          } > "$SPEC_FILE"

          echo "=== Generated spec file ==="
          cat "$SPEC_FILE"
          echo "==========================="

          mkdir -p "$GITHUB_WORKSPACE/gui_rpm_output"

          rpmbuild -bb "$SPEC_FILE" \
            --define "_rpmdir $GITHUB_WORKSPACE/gui_rpm_output" \
            --target "$ARCH"

          echo "Repackaged RPM dependencies:"
          NEWRPM=$(find "$GITHUB_WORKSPACE/gui_rpm_output" -name "*.rpm" -type f -print -quit)
          rpm -qpR "$NEWRPM" || true

          echo "gui_rpm_available=true" >> $GITHUB_OUTPUT

      - name: Collect GUI RPM artifacts
        id: find-gui-rpms
        run: |
          mkdir -p gui_rpm_output
          find gui_rpm_output -name "*.rpm" -type f -exec mv {} gui_rpm_output/ \; 2>/dev/null || true

          echo "Contents of gui_rpm_output:"
          ls -la gui_rpm_output/

          if [ "$(ls gui_rpm_output/*.rpm 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "gui_rpm_files_found=true" >> $GITHUB_OUTPUT
          else
            echo "gui_rpm_files_found=false" >> $GITHUB_OUTPUT
            echo "No GUI RPM files found"
          fi

      - name: Upload GUI RPM artifacts
        if: steps.find-gui-rpms.outputs.gui_rpm_files_found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-rpm
          path: gui_rpm_output/*.rpm
          if-no-files-found: warn

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  build-gui-pacman:
    name: Build GUI pacman (${{ matrix.package_name }})
    needs: [build-gui]
    if: needs.build-gui.result == 'success'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
            pacman_arch: x86_64
            image: archlinux:latest
          - os: ubuntu-22.04-arm
            package_name: linux-aarch64
            pacman_arch: aarch64
            image: menci/archlinuxarm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Arch dependencies
        run: |
          pacman -Sy --noconfirm --overwrite '*' base-devel curl git github-cli

      - name: Download built GUI artifact
        uses: actions/download-artifact@v8
        with:
          name: gui-rpm-repackage-input-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}
          path: pacman-input/

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0.${GITHUB_SHA:0:7}"
          fi
          # pacman doesn't allow '-' in pkgver; replace with '.'
          VERSION="${VERSION//-/.}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Create pacman package for GUI
        shell: bash
        run: |
          set -euo pipefail

          PKG_VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION="${PKG_VERSION#v}"
          PKG_VERSION="${PKG_VERSION//-/.}"
          PKG_REL="1"
          PACMAN_ARCH="${{ matrix.pacman_arch }}"
          PKG_NAME="eim-gui"

          PKG_DIR=$(mktemp -d)
          mkdir -p "$PKG_DIR/usr/bin"

          cp pacman-input/eim "$PKG_DIR/usr/bin/eim"
          chmod +x "$PKG_DIR/usr/bin/eim"

          ISIZE=$(du -sb "$PKG_DIR" | awk '{print $1}')

          {
            printf 'pkgname = %s\n'   "${PKG_NAME}"
            printf 'pkgver = %s-%s\n' "${PKG_VERSION}" "${PKG_REL}"
            printf 'pkgdesc = %s\n'   "Espressif IDF Installation Manager (GUI)"
            printf 'url = %s\n'       "https://github.com/espressif/idf-im-ui"
            printf 'builddate = %s\n' "$(date +%s)"
            printf 'packager = %s\n'  "Espressif Systems CI <[email protected]>"
            printf 'size = %s\n'      "${ISIZE}"
            printf 'arch = %s\n'      "${PACMAN_ARCH}"
            printf 'license = %s\n'   "MIT"
            for dep in gtk4 libadwaita webkit2gtk-4.1 libusb libffi openssl; do
              printf 'depend = %s\n' "$dep"
            done
          } > "$PKG_DIR/.PKGINFO"

          echo "=== Generated .PKGINFO ==="
          cat -A "$PKG_DIR/.PKGINFO"
          echo "=========================="

          cd "$PKG_DIR"
          LANG=C bsdtar -czf .MTREE \
            --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            .PKGINFO usr

          OUT="$HOME/${PKG_NAME}-${PKG_VERSION}-${PKG_REL}-${PACMAN_ARCH}.pkg.tar.zst"
          if command -v zstd >/dev/null 2>&1; then
            tar --zstd -cf "$OUT" .PKGINFO .MTREE usr
          else
            OUT="${OUT%.zst}.gz"
            tar -czf "$OUT" .PKGINFO .MTREE usr
          fi

          ls -la "$OUT"
          echo "Built pacman package: $OUT"

      - name: Collect pacman package
        id: collect-pkg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/pacman_output"
          shopt -s nullglob
          pkgs=("$HOME"/*.pkg.tar.zst "$HOME"/*.pkg.tar.gz)
          shopt -u nullglob

          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No pacman packages found in $HOME" >&2
            ls -la "$HOME" >&2
            exit 1
          fi

          cp "${pkgs[@]}" "$GITHUB_WORKSPACE/pacman_output/"
          ls -la "$GITHUB_WORKSPACE/pacman_output/"

      - name: Upload pacman artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (inputs.is_release && inputs.version) || github.run_number }}-pacman
          path: pacman_output/*.pkg.tar.*
          if-no-files-found: warn

      - name: Cancel workflow on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

  Autotest-CLI:
    name: Autotest CLI
    needs: [build-cli, build-cli-linux, build-cli-linux-armv7]
    if: needs.build-cli.result == 'success' && needs.build-cli-linux.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/test_cli.yml
    with:
      run_id: ${{ github.run_id }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      run_extended: ${{inputs.is_release || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'EXTENDEDTEST')) || startsWith(github.event.pull_request.head.ref, 'release')}}
      run_self_hosted: ${{inputs.is_release || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'CNRUNNER'))}}

  Autotest-GUI:
    name: Autotest GUI
    needs: [build-gui]
    if: needs.build-gui.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/test_gui.yml
    with:
      run_id: ${{ github.run_id }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      run_extended: ${{inputs.is_release || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'EXTENDEDTEST')) || startsWith(github.event.pull_request.head.ref, 'release')}}
