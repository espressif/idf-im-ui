name: Post-Release Distribution

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.15.0)"
        required: true
        type: string

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  backup-repos:
    name: Backup Current Repositories
    runs-on: ubuntu-latest
    outputs:
      homebrew_sha: ${{ steps.backup.outputs.homebrew_sha }}
      tag: ${{ steps.backup.outputs.tag }}
    steps:
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-east-1

      - name: Backup repositories
        id: backup
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          echo "=== Backup Homebrew HEAD ==="
          HOMEBREW_SHA=$(gh api repos/espressif/homebrew-eim/git/refs/heads/main --jq '.object.sha' 2>/dev/null || echo "")
          if [[ -z "$HOMEBREW_SHA" ]]; then
            HOMEBREW_SHA=$(gh api repos/espressif/homebrew-eim/git/refs/heads/master --jq '.object.sha' 2>/dev/null || echo "")
          fi
          echo "homebrew_sha=$HOMEBREW_SHA" >> $GITHUB_OUTPUT
          echo "Homebrew HEAD: $HOMEBREW_SHA"

          echo "=== Backup S3 APT repo ==="
          aws s3 sync s3://espdldata/dl/eim/apt/ s3://espdldata/dl/eim/.backup/apt/ --quiet || echo "No existing APT repo"

          echo "=== Backup S3 RPM repo ==="
          aws s3 sync s3://espdldata/dl/eim/rpm/ s3://espdldata/dl/eim/.backup/rpm/ --quiet || echo "No existing RPM repo"

          echo "=== Backup S3 Pacman repo ==="
          aws s3 sync s3://espdldata/dl/eim/pacman/ s3://espdldata/dl/eim/.backup/pacman/ --quiet || echo "No existing Pacman repo"

          echo "=== Backup eim_unified_release.json ==="
          aws s3 cp s3://espdldata/dl/eim/eim_unified_release.json s3://espdldata/dl/eim/.backup/eim_unified_release.json --quiet || echo "No existing release JSON"

          echo "Backup complete"

  update-release-info:
    name: Update Release Information
    needs: [backup-repos]
    runs-on: ubuntu-latest
    steps:
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-east-1

      - name: Fetch and upload release info
        env:
          DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest > eim_unified_release.json
          echo "Latest release tag: $(jq -r .tag_name eim_unified_release.json)"
          aws s3 cp --acl=public-read "eim_unified_release.json" s3://espdldata/dl/eim/eim_unified_release.json
          aws cloudfront create-invalidation --distribution-id ${DL_DISTRIBUTION_ID} --paths "/dl/eim/eim_unified_release.json"

  update-homebrew:
    name: Update Homebrew Formula and Cask
    needs: [backup-repos, update-release-info]
    permissions:
      contents: write
    uses: ./.github/workflows/update-homebrew.yml
    with:
      version: ${{ needs.backup-repos.outputs.tag }}
    secrets: inherit

  update-linux-repos:
    name: Update APT, RPM, and Pacman Repositories
    needs: [backup-repos, update-release-info]
    permissions:
      contents: write
    uses: ./.github/workflows/update-linux-repos.yml
    with:
      version: ${{ needs.backup-repos.outputs.tag }}
    secrets: inherit

  update-windows-packages:
    name: Generate Windows Packages and Publish to WinGet
    needs: [backup-repos, update-release-info]
    permissions:
      contents: write
    uses: ./.github/workflows/update-windows-packages.yml
    with:
      version: ${{ needs.backup-repos.outputs.tag }}
    secrets: inherit

  test-pkg-managers:
    name: Test Package Managers
    needs: [backup-repos, update-homebrew, update-linux-repos, update-windows-packages]
    uses: ./.github/workflows/test_pkg_managers.yml
    with:
      version: ${{ needs.backup-repos.outputs.tag }}
      run_mode: release
    secrets: inherit

  rollback:
    name: Rollback on Failure
    needs: [backup-repos, update-release-info, update-homebrew, update-linux-repos, update-windows-packages, test-pkg-managers]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-east-1

      - name: Rollback Homebrew
        if: needs.backup-repos.outputs.homebrew_sha != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BACKUP_SHA="${{ needs.backup-repos.outputs.homebrew_sha }}"
          echo "Rolling back espressif/homebrew-eim to $BACKUP_SHA"

          DEFAULT_BRANCH=$(gh api repos/espressif/homebrew-eim --jq '.default_branch' 2>/dev/null || echo "main")
          gh api repos/espressif/homebrew-eim/git/refs/heads/${DEFAULT_BRANCH} \
            -X PATCH -f sha="$BACKUP_SHA" -F force=true || echo "::warning::Homebrew rollback failed"
          echo "Homebrew rolled back"

      - name: Rollback S3 APT repo
        run: |
          echo "Restoring APT repo from backup..."
          aws s3 sync s3://espdldata/dl/eim/.backup/apt/ s3://espdldata/dl/eim/apt/ --acl public-read --delete --quiet || echo "::warning::APT rollback failed"

      - name: Rollback S3 RPM repo
        run: |
          echo "Restoring RPM repo from backup..."
          aws s3 sync s3://espdldata/dl/eim/.backup/rpm/ s3://espdldata/dl/eim/rpm/ --acl public-read --delete --quiet || echo "::warning::RPM rollback failed"

      - name: Rollback S3 Pacman repo
        run: |
          echo "Restoring Pacman repo from backup..."
          aws s3 sync s3://espdldata/dl/eim/.backup/pacman/ s3://espdldata/dl/eim/pacman/ --acl public-read --delete --quiet || echo "::warning::Pacman rollback failed"

      - name: Rollback eim_unified_release.json
        run: |
          echo "Restoring eim_unified_release.json from backup..."
          aws s3 cp s3://espdldata/dl/eim/.backup/eim_unified_release.json s3://espdldata/dl/eim/eim_unified_release.json --acl public-read --quiet || echo "::warning::Release JSON rollback failed"

      - name: Invalidate CloudFront caches
        env:
          DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id ${DL_DISTRIBUTION_ID} \
            --paths "/dl/eim/apt/*" "/dl/eim/rpm/*" "/dl/eim/pacman/*" "/dl/eim/eim_unified_release.json"

      - name: Rollback summary
        run: |
          echo "::warning::Rollback completed. WinGet PRs (if any) cannot be auto-rolled back — close them manually at https://github.com/microsoft/winget-pkgs/pulls"
          echo ""
          echo "Rolled back:"
          echo "  - Homebrew: ${{ needs.backup-repos.outputs.homebrew_sha || 'skipped (no SHA)' }}"
          echo "  - APT repo: restored from .backup/"
          echo "  - RPM repo: restored from .backup/"
          echo "  - Pacman repo: restored from .backup/"
          echo "  - eim_unified_release.json: restored from .backup/"
          echo ""
          echo "NOT rolled back (manual action required):"
          echo "  - WinGet: check https://github.com/microsoft/winget-pkgs/pulls for open PRs by Hahihula"
