        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (github.event_name == 'release' && github.ref_name) || github.run_number }}
          path: |
            src-tauri/target/release/eim.exe
          if-no-files-found: warn

      - name: Upload Windows artifacts - msi
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (github.event_name == 'release' && github.ref_name) || github.run_number }}-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Release Assets (Windows)
        if: github.event_name == 'release' && github.event.action == 'created' && runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/eim.exe "eim-gui-${{ matrix.package_name }}.exe"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.exe" --clobber

      - name: Upload Release Assets (Windows msi)
        if: github.event_name == 'release' && github.event.action == 'created' && runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSI_FILE=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          cp "$MSI_FILE" "eim-gui-${{ matrix.package_name }}.msi"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.msi" --clobber

      - name: Upload Release Assets (Linux)
        if: github.event_name == 'release' && github.event.action == 'created' && startsWith(matrix.os, 'ubuntu')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/eim.zip "eim-gui-${{ matrix.package_name }}.zip"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.zip" --clobber

      - name: Upload Release Assets (Linux - .deb)
        if: github.event_name == 'release' && github.event.action == 'created' && startsWith(matrix.os, 'ubuntu')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB_FILE=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          cp "$DEB_FILE" "eim-gui-${{ matrix.package_name }}.deb"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.deb" --clobber

      - name: Upload Release Assets (Linux - .AppImage)
        if: github.event_name == 'release' && github.event.action == 'created' && startsWith(matrix.os, 'ubuntu')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE_FILE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$APPIMAGE_FILE" "eim-gui-${{ matrix.package_name }}.AppImage"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.AppImage" --clobber

      - name: Upload Release Assets (macOS)
        if: github.event_name == 'release' && github.event.action == 'created' && startsWith(matrix.os, 'macos')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/bundle/macos/eim.zip "eim-gui-${{ matrix.package_name }}.zip"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.zip" --clobber

      - name: Upload Release Assets (macOS - dmg)
        if: github.event_name == 'release' && github.event.action == 'created' && startsWith(matrix.os, 'macos')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_FILE=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          cp "$DMG_FILE" "eim-gui-${{ matrix.package_name }}.dmg"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.dmg" --clobber

  # ============================================================
  # Repackage GUI RPMs inside Fedora container
  # ============================================================
  build-gui-rpm:
    name: Repackage GUI RPM (${{ matrix.package_name }})
    needs: [build-gui]
    if: needs.build-gui.result == 'success'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    container:
      image: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_name: linux-x64
          - os: ubuntu-22.04-arm
            package_name: linux-aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fedora dependencies
        run: |
          dnf install -y rpm-build rpmdevtools rpm-sign gh git

      - name: Download Tauri-generated RPM
        uses: actions/download-artifact@v4
        with:
          name: gui-rpm-repackage-input-${{ matrix.package_name }}-${{ (github.event_name == 'release' && github.ref_name) || github.run_number }}
          path: gui-rpm-input/

      - name: Repackage RPM without python upper bound
        shell: bash
        run: |
          set -euo pipefail

          # Find the original RPM from the Tauri build
          ORIG_RPM=$(find gui-rpm-input -name "*.rpm" -type f -print -quit)

          if [ -z "$ORIG_RPM" ]; then
            echo "No GUI RPM found in artifacts, skipping repackage"
            echo "gui_rpm_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ORIG_RPM="$(realpath "$ORIG_RPM")"
          echo "Original RPM: $ORIG_RPM"
          echo "Original dependencies:"
          rpm -qpR "$ORIG_RPM" || true

          # Check if the RPM actually has the python upper bound issue
          if ! rpm -qpR "$ORIG_RPM" 2>/dev/null | grep -i "python.*<"; then
            echo "RPM does not have python upper bound issue, using as-is"
            mkdir -p "$GITHUB_WORKSPACE/gui_rpm_output"
            cp "$ORIG_RPM" "$GITHUB_WORKSPACE/gui_rpm_output/"
            echo "gui_rpm_available=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found python upper bound in RPM, repackaging..."

          # Extract RPM contents into a staging directory
          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"
          rpm2cpio "$ORIG_RPM" | cpio -idmv

          # Helper: read an RPM tag, return a fallback if the value is empty or "(none)"
          rpm_tag() {
            local val
            val=$(rpm -qp --queryformat "%{$1}" "$ORIG_RPM" 2>/dev/null || true)
            if [ -z "$val" ] || [ "$val" = "(none)" ]; then
              echo "$2"   # fallback
            else
              echo "$val"
            fi
          }

          NAME=$(rpm_tag NAME "eim")
          VERSION=$(rpm_tag VERSION "0.0.0")
          RELEASE=$(rpm_tag RELEASE "1")
          SUMMARY=$(rpm_tag SUMMARY "Espressif IDF Installation Manager")
          LICENSE=$(rpm_tag LICENSE "MIT")
          ARCH=$(rpm_tag ARCH "x86_64")
          DESCRIPTION=$(rpm_tag DESCRIPTION "Espressif IDF Installation Manager GUI application")

          # Collect dependencies, filtering out python upper bounds and rpmlib() auto-deps
          mapfile -t REQ_LINES < <(
            rpm -qpR "$ORIG_RPM" 2>/dev/null \
              | grep -v "python.*<" \
              | grep -v "^rpmlib(" \
              | sort -u
          )

          # Build the spec file
          rpmdev-setuptree
          SPEC_FILE="$HOME/rpmbuild/SPECS/eim-gui.spec"

          {
            echo "Name:           ${NAME}"
            echo "Version:        ${VERSION}"
            echo "Release:        ${RELEASE}"
            echo "Summary:        ${SUMMARY}"
            echo "License:        ${LICENSE}"
            echo "AutoReqProv:    no"
            echo ""
            # Write each cleaned-up Requires line
            for req in "${REQ_LINES[@]}"; do
              req=$(echo "$req" | xargs)  # trim whitespace
              [ -n "$req" ] && echo "Requires:       ${req}"
            done
            echo ""
            echo "%description"
            echo "${DESCRIPTION}"
            echo ""
            echo "%install"
            echo "cp -a ${WORK_DIR}/* %{buildroot}/"
            echo ""
            echo "%files"
            # List every file and symlink
            find . -type f -o -type l | sed 's|^\./|/|'
            # List directories (excluding root)
            find . -mindepth 1 -type d | sed 's|^\./|%dir /|'
          } > "$SPEC_FILE"

          echo "=== Generated spec file ==="
          cat "$SPEC_FILE"
          echo "==========================="

          mkdir -p "$GITHUB_WORKSPACE/gui_rpm_output"

          # Build the new RPM
          rpmbuild -bb "$SPEC_FILE" \
            --define "_rpmdir $GITHUB_WORKSPACE/gui_rpm_output" \
            --target "$ARCH"

          echo "Repackaged RPM dependencies:"
          NEWRPM=$(find "$GITHUB_WORKSPACE/gui_rpm_output" -name "*.rpm" -type f -print -quit)
          rpm -qpR "$NEWRPM" || true

          echo "gui_rpm_available=true" >> $GITHUB_OUTPUT

      - name: Collect GUI RPM artifacts
        id: find-gui-rpms
        run: |
          mkdir -p gui_rpm_output
          # Move RPMs from arch subdirectories to flat dir
          find gui_rpm_output -name "*.rpm" -type f -exec mv {} gui_rpm_output/ \; 2>/dev/null || true

          echo "Contents of gui_rpm_output:"
          ls -la gui_rpm_output/

          if [ "$(ls gui_rpm_output/*.rpm 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "gui_rpm_files_found=true" >> $GITHUB_OUTPUT
          else
            echo "gui_rpm_files_found=false" >> $GITHUB_OUTPUT
            echo "No GUI RPM files found"
          fi

      - name: Upload GUI RPM artifacts
        if: steps.find-gui-rpms.outputs.gui_rpm_files_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eim-gui-${{ matrix.package_name }}-${{ (github.event_name == 'release' && github.ref_name) || github.run_number }}-rpm
          path: gui_rpm_output/*.rpm
          if-no-files-found: warn

      - name: Upload GUI RPM Release Asset
        if: github.event_name == 'release' && github.event.action == 'created' && steps.find-gui-rpms.outputs.gui_rpm_files_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM_FILE=$(ls gui_rpm_output/*.rpm | head -1)
          cp "$RPM_FILE" "eim-gui-${{ matrix.package_name }}.rpm"
          gh release upload "${{ github.event.release.tag_name }}" "eim-gui-${{ matrix.package_name }}.rpm" --repo "${{ github.repository }}" --clobber

  jira-build-artifacts-comment:
    name: Post build artifacts comment on Jira
    needs: [build-cli, build-cli-linux, build-gui]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/jira-build-artifacts-comment.yml
    with:
      run_id: ${{ github.run_id }}
      pr_title: ${{ github.event.pull_request.title }}
    secrets: inherit

  Autotest-CLI:
    name: Autotest CLI
    needs: [build-cli, build-cli-linux, build-cli-linux-armv7]
    if: needs.build-cli.result == 'success' && needs.build-cli-linux.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/test_cli.yml
    with:
      run_id: ${{ github.run_id }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      run_extended: ${{(github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'EXTENDEDTEST')) || startsWith(github.event.pull_request.head.ref, 'release')}}
      run_self_hosted: ${{(github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'CNRUNNER'))}}

  Autotest-GUI:
    name: Autotest GUI
    needs: [build-gui]
    if: needs.build-gui.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/test_gui.yml
    with:
      run_id: ${{ github.run_id }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      run_extended: ${{(github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'EXTENDEDTEST')) || startsWith(github.event.pull_request.head.ref, 'release')}}

  update-release-info:
    name: Update Release Information
    needs: [build-cli, build-cli-linux, build-cli-linux-armv7, build-gui]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Fetch latest release info
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-east-1
          DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}
        run: |
          # GUI release info
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/espressif/idf-im-ui/releases/latest > eim_unified_release.json
          echo "Latest GUI release tag: $(jq -r .tag_name eim_unified_release.json)"
          aws s3 cp --acl=public-read "eim_unified_release.json" s3://espdldata/dl/eim/eim_unified_release.json
          aws cloudfront create-invalidation --distribution-id ${DL_DISTRIBUTION_ID} --paths "/dl/eim/eim_unified_release.json"

  update-homebrew:
    name: Update Homebrew Formula and Cask
    needs: [build-cli, build-cli-linux, build-cli-linux-armv7, build-gui, update-release-info]
    permissions:
      contents: write
    uses: ./.github/workflows/update-homebrew.yml
    with:
      version: ${{ github.ref_name }}
    if: github.event_name == 'release' && github.event.action == 'created'
    secrets: inherit

  update-linux-repos:
    name: Update APT and RPM Repositories
    needs: [build-cli-linux, build-cli-linux-armv7, build-gui, build-cli-rpm, build-gui-rpm, update-release-info]
    permissions:
      contents: write
    uses: ./.github/workflows/update-linux-repos.yml
    if: github.event_name == 'release' && github.event.action == 'created'
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  update-windows-packages:
    name: Generate Windows Packages and Publish to WinGet
    needs: [build-cli, build-gui, update-release-info]
    permissions:
      contents: write
    uses: ./.github/workflows/update-windows-packages.yml
    if: github.event_name == 'release' && github.event.action == 'created'
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  Autotest-PkgManagers:
    name: Autotest Package Manager Installation
    needs: [update-linux-repos, update-homebrew, update-windows-packages]
    uses: ./.github/workflows/test_pkg_managers.yml
    if: github.event_name == 'release' && github.event.action == 'created'
    with:
      version: ${{ github.ref_name }}
      run_mode: release
    secrets: inherit

  Autotest-PkgManagers-Nightly:
    name: Autotest Package Manager Installation (Nightly)
    needs: [build-cli-linux]
    uses: ./.github/workflows/test_pkg_managers.yml
    if: github.event_name == 'schedule'
    with:
      version: ''
      run_mode: nightly
    secrets: inherit
