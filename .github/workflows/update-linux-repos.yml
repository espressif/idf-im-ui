name: Update APT, RPM, and Pacman Repositories

on:
  workflow_call:
    inputs:
      version:
        description: 'The release version/tag (e.g., v1.2.3) for artifact names'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'The release version/tag (e.g., v1.2.3) for artifact names'
        required: true
        type: string

jobs:
  update-apt-repo:
    name: Update APT Repository on S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-east-1

      - name: Install dependencies for APT repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gzip

      - name: Download GUI linux-x64 .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-gui-linux-x64-${{ inputs.version }}-deb
          path: new-debs/

      - name: Download GUI linux-aarch64 .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-gui-linux-aarch64-${{ inputs.version }}-deb
          path: new-debs/
        continue-on-error: true

      - name: Download CLI linux-x64 .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-x64-${{ inputs.version }}-deb
          path: new-debs/

      - name: Download CLI linux-aarch64 .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-aarch64-${{ inputs.version }}-deb
          path: new-debs/
        continue-on-error: true

      - name: Download CLI linux-armv7 .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-armv7-${{ inputs.version }}-deb
          path: new-debs/
        continue-on-error: true

      - name: Create proper APT repository structure
        run: |
          # Create proper directory structure (now includes armhf)
          mkdir -p apt-repo/pool/main
          mkdir -p apt-repo/dists/stable/main/binary-amd64
          mkdir -p apt-repo/dists/stable/main/binary-arm64
          mkdir -p apt-repo/dists/stable/main/binary-armhf

          # Sync existing .deb files from S3 pool
          aws s3 sync s3://espdldata/dl/eim/apt/pool/main/ apt-repo/pool/main/ --exclude "*" --include "*.deb" || echo "No existing pool found"

          # Copy new .deb files to pool
          find new-debs -name "*.deb" -exec cp {} apt-repo/pool/main/ \; || echo "Warning: Some .deb files could not be copied"

          # Debug: Show what's in the pool
          echo "Pool contents:"
          ls -la apt-repo/pool/main/

      - name: Generate APT repository metadata
        working-directory: apt-repo
        run: |
          # Generate Packages files for each architecture
          # AMD64 packages
          dpkg-scanpackages --arch amd64 pool/main > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          # ARM64 packages
          dpkg-scanpackages --arch arm64 pool/main > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # ARMHF packages
          dpkg-scanpackages --arch armhf pool/main > dists/stable/main/binary-armhf/Packages
          gzip -k -f dists/stable/main/binary-armhf/Packages

          # Generate Release file (now includes armhf)
          cd dists/stable
          cat > Release << EOF
          Origin: Espressif Systems
          Label: ESP-IDF Installation Manager
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64 armhf
          Components: main
          Description: ESP-IDF Installation Manager packages
          Date: $(date -Ru)
          EOF

          # Add file hashes to Release
          apt-ftparchive release . >> Release

          echo "Generated Release file:"
          cat Release

      - name: Upload repository to S3
        run: |
          # Upload the entire repository structure
          aws s3 sync apt-repo/ s3://espdldata/dl/eim/apt/ --acl public-read --delete

          # Verify upload
          echo "Uploaded repository structure:"
          aws s3 ls s3://espdldata/dl/eim/apt/ --recursive

      - name: Invalidate CloudFront cache
        env:
          DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id ${DL_DISTRIBUTION_ID} --paths "/dl/eim/apt/*"

  update-rpm-repo:
    name: Update RPM Repository on S3
    needs: update-apt-repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-east-1

      - name: Install createrepo-c for RPM repo management
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c rpm

      - name: Download CLI linux-x64 .rpm artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-x64-${{ inputs.version }}-rpm
          path: new-rpms/

      - name: Download CLI linux-aarch64 .rpm artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-aarch64-${{ inputs.version }}-rpm
          path: new-rpms/
        continue-on-error: true

      - name: Download CLI linux-armv7 .rpm artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-armv7-${{ inputs.version }}-rpm
          path: new-rpms/
        continue-on-error: true

      - name: Download GUI linux-x64 .rpm artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-gui-linux-x64-${{ inputs.version }}-rpm
          path: new-rpms/
        continue-on-error: true

      - name: Download GUI linux-aarch64 .rpm artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-gui-linux-aarch64-${{ inputs.version }}-rpm
          path: new-rpms/
        continue-on-error: true

      - name: Create RPM repository structure
        run: |
          # Create directory structure (now includes armv7hl)
          mkdir -p rpm-repo/x86_64
          mkdir -p rpm-repo/aarch64
          mkdir -p rpm-repo/armv7hl

          # Sync existing .rpm files from S3
          aws s3 sync s3://espdldata/dl/eim/rpm/x86_64/ rpm-repo/x86_64/ --exclude "*" --include "*.rpm" || echo "No existing x86_64 RPMs found"
          aws s3 sync s3://espdldata/dl/eim/rpm/aarch64/ rpm-repo/aarch64/ --exclude "*" --include "*.rpm" || echo "No existing aarch64 RPMs found"
          aws s3 sync s3://espdldata/dl/eim/rpm/armv7hl/ rpm-repo/armv7hl/ --exclude "*" --include "*.rpm" || echo "No existing armv7hl RPMs found"

          # Debug: Show contents of downloaded RPMs
          echo "Downloaded RPM artifacts:"
          find new-rpms -type f -name "*.rpm" -exec ls -la {} \;

          # Copy new .rpm files to appropriate architecture directories
          if [ -d "new-rpms" ] && [ "$(ls -A new-rpms)" ]; then
            # Copy x86_64 RPMs
            find new-rpms -type f \( -name "*x86_64*.rpm" -o -name "*amd64*.rpm" -o -name "*linux-x64*.rpm" \) -exec cp {} rpm-repo/x86_64/ \; || echo "No x86_64 RPMs to copy"

            # Copy aarch64 RPMs
            find new-rpms -type f \( -name "*aarch64*.rpm" -o -name "*arm64*.rpm" -o -name "*linux-aarch64*.rpm" \) -exec cp {} rpm-repo/aarch64/ \; || echo "No aarch64 RPMs to copy"

            # Copy armv7hl RPMs
            find new-rpms -type f \( -name "*armv7*.rpm" -o -name "*armhf*.rpm" -o -name "*linux-armv7*.rpm" \) -exec cp {} rpm-repo/armv7hl/ \; || echo "No armv7hl RPMs to copy"

            echo "Copied RPM files:"
            echo "x86_64 RPMs:"
            ls -la rpm-repo/x86_64/ || echo "No x86_64 RPMs"
            echo "aarch64 RPMs:"
            ls -la rpm-repo/aarch64/ || echo "No aarch64 RPMs"
            echo "armv7hl RPMs:"
            ls -la rpm-repo/armv7hl/ || echo "No armv7hl RPMs"
          else
            echo "No RPM artifacts downloaded"
          fi

      - name: Generate RPM repository metadata
        working-directory: rpm-repo
        run: |
          # Generate metadata for x86_64
          if [ -d "x86_64" ] && [ "$(ls -A x86_64/*.rpm 2>/dev/null)" ]; then
            echo "Generating metadata for x86_64 RPMs..."
            createrepo_c x86_64/ --update
            echo "x86_64 metadata generated successfully"
          else
            echo "No x86_64 RPMs found, skipping metadata generation"
          fi

          # Generate metadata for aarch64
          if [ -d "aarch64" ] && [ "$(ls -A aarch64/*.rpm 2>/dev/null)" ]; then
            echo "Generating metadata for aarch64 RPMs..."
            createrepo_c aarch64/ --update
            echo "aarch64 metadata generated successfully"
          else
            echo "No aarch64 RPMs found, skipping metadata generation"
          fi

          # Generate metadata for armv7hl
          if [ -d "armv7hl" ] && [ "$(ls -A armv7hl/*.rpm 2>/dev/null)" ]; then
            echo "Generating metadata for armv7hl RPMs..."
            createrepo_c armv7hl/ --update
            echo "armv7hl metadata generated successfully"
          else
            echo "No armv7hl RPMs found, skipping metadata generation"
          fi

      - name: Create repo file
        run: |
          cat > rpm-repo/eim.repo << EOF
          [eim]
          name=ESP-IDF Installation Manager
          baseurl=https://dl.espressif.com/dl/eim/rpm/\$basearch
          enabled=1
          gpgcheck=0
          EOF

          echo "Generated eim.repo:"
          cat rpm-repo/eim.repo

      - name: Upload repository to S3
        run: |
          # Upload the entire repository structure
          aws s3 sync rpm-repo/ s3://espdldata/dl/eim/rpm/ --acl public-read --delete

          # Verify upload
          echo "Uploaded repository structure:"
          aws s3 ls s3://espdldata/dl/eim/rpm/ --recursive

      - name: Invalidate CloudFront cache
        env:
          DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id ${DL_DISTRIBUTION_ID} --paths "/dl/eim/rpm/*"

  update-pacman-repo:
    name: Update Pacman Repository on S3
    needs: update-rpm-repo
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Arch dependencies
        run: |
          pacman -Syu --noconfirm --overwrite '*' base-devel git zstd python-pip
          # awscli isn't in Arch's official repos; install via pip
          pip install --break-system-packages awscli

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials (env)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF
          cat > ~/.aws/config << EOF
          [default]
          region = ap-east-1
          EOF

      - name: Download CLI linux-x64 pacman artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-x64-${{ inputs.version }}-pacman
          path: new-pkgs/
        continue-on-error: true

      - name: Download CLI linux-aarch64 pacman artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-aarch64-${{ inputs.version }}-pacman
          path: new-pkgs/
        continue-on-error: true

      - name: Download CLI linux-armv7 pacman artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-cli-linux-armv7-${{ inputs.version }}-pacman
          path: new-pkgs/
        continue-on-error: true

      - name: Download GUI linux-x64 pacman artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-gui-linux-x64-${{ inputs.version }}-pacman
          path: new-pkgs/

      - name: Download GUI linux-aarch64 pacman artifact
        uses: actions/download-artifact@v8
        with:
          name: eim-gui-linux-aarch64-${{ inputs.version }}-pacman
          path: new-pkgs/
        continue-on-error: true

      - name: Create Pacman repository structure
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pacman-repo/x86_64
          mkdir -p pacman-repo/aarch64
          mkdir -p pacman-repo/armv7h

          # Sync existing packages from S3 (so previous versions stay available)
          aws s3 sync s3://espdldata/dl/eim/pacman/x86_64/ pacman-repo/x86_64/ --exclude "*" --include "*.pkg.tar.*" || echo "No existing x86_64 pacman packages"
          aws s3 sync s3://espdldata/dl/eim/pacman/aarch64/ pacman-repo/aarch64/ --exclude "*" --include "*.pkg.tar.*" || echo "No existing aarch64 pacman packages"
          aws s3 sync s3://espdldata/dl/eim/pacman/armv7h/  pacman-repo/armv7h/  --exclude "*" --include "*.pkg.tar.*" || echo "No existing armv7h pacman packages"

          echo "Downloaded artifacts:"
          find new-pkgs -type f -name "*.pkg.tar.*" -exec ls -la {} \; || true

          if [ -d "new-pkgs" ] && [ -n "$(ls -A new-pkgs 2>/dev/null || true)" ]; then
            # Route packages to the correct arch directory based on filename
            find new-pkgs -type f \( -name "*-x86_64.pkg.tar.*"  -o -name "*linux-x64*.pkg.tar.*" \)  -exec cp {} pacman-repo/x86_64/  \; || true
            find new-pkgs -type f \( -name "*-aarch64.pkg.tar.*" -o -name "*linux-aarch64*.pkg.tar.*" \) -exec cp {} pacman-repo/aarch64/ \; || true
            find new-pkgs -type f \( -name "*-armv7h.pkg.tar.*"  -o -name "*linux-armv7*.pkg.tar.*"  -o -name "*-armv7hl.pkg.tar.*" \) -exec cp {} pacman-repo/armv7h/ \; || true

            echo "Routed packages:"
            ls -la pacman-repo/x86_64/  || true
            ls -la pacman-repo/aarch64/ || true
            ls -la pacman-repo/armv7h/  || true
          else
            echo "No pacman artifacts downloaded"
          fi

      - name: Generate Pacman repository databases
        shell: bash
        run: |
          set -euo pipefail

          # repo-add builds the .db / .files databases pacman needs
          for ARCH in x86_64 aarch64 armv7h; do
            DIR="pacman-repo/$ARCH"
            shopt -s nullglob
            PKGS=("$DIR"/*.pkg.tar.*)
            shopt -u nullglob

            if [ ${#PKGS[@]} -eq 0 ]; then
              echo "No packages for $ARCH, skipping db generation"
              continue
            fi

            echo "Building eim.db.tar.gz for $ARCH from ${#PKGS[@]} package(s)..."
            (cd "$DIR" && repo-add -n -R eim.db.tar.gz *.pkg.tar.*)

            # repo-add creates symlinks (eim.db -> eim.db.tar.gz, eim.files -> ...).
            # S3 doesn't preserve symlinks, so materialize them as real files.
            for link in "$DIR"/eim.db "$DIR"/eim.files; do
              if [ -L "$link" ]; then
                target="$(readlink "$link")"
                rm "$link"
                cp "$DIR/$target" "$link"
              fi
            done

            echo "Contents of $DIR:"
            ls -la "$DIR"
          done

      - name: Create pacman.conf snippet for end users
        run: |
          cat > pacman-repo/eim.pacman.conf << 'EOF'
          # Add this snippet to /etc/pacman.conf
          [eim]
          SigLevel = Optional TrustAll
          Server = https://dl.espressif.com/dl/eim/pacman/$arch
          EOF
          echo "Generated eim.pacman.conf:"
          cat pacman-repo/eim.pacman.conf

      - name: Upload Pacman repository to S3
        run: |
          aws s3 sync pacman-repo/ s3://espdldata/dl/eim/pacman/ --acl public-read --delete
          echo "Uploaded pacman repo:"
          aws s3 ls s3://espdldata/dl/eim/pacman/ --recursive

      - name: Invalidate CloudFront cache
        env:
          DL_DISTRIBUTION_ID: ${{ secrets.DL_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id ${DL_DISTRIBUTION_ID} --paths "/dl/eim/pacman/*"
